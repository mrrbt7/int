(function(){
  // Generate icon via canvas
  try{
    const c=document.createElement('canvas');c.width=512;c.height=512;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#000';ctx.fillRect(0,0,512,512);
    // Rounded rect background
    ctx.fillStyle='#CAFF4C';
    const r=80;const x=40,y=40,w=432,h=432;
    ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();
    ctx.fillStyle='#000';ctx.font='bold 280px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⚡',256,270);
    const iconUrl=c.toDataURL('image/png');
    // Apple touch icon
    const al=document.createElement('link');al.rel='apple-touch-icon';al.href=iconUrl;document.head.appendChild(al);
    // Manifest
    const manifest={name:'SPRINT',short_name:'SPRINT',start_url:location.href,
      display:'standalone',background_color:'#000000',theme_color:'#CAFF4C',
      icons:[{src:iconUrl,sizes:'512x512',type:'image/png'},{src:iconUrl,sizes:'192x192',type:'image/png'}]};
    const mb=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(mb);document.head.appendChild(ml);
    // Service worker (basic cache for offline)
    if('serviceWorker' in navigator){
      const swCode=`
        const V='sprint-v2-3';
        self.addEventListener('install',e=>{self.skipWaiting();});
        self.addEventListener('activate',e=>e.waitUntil(clients.claim()));
        self.addEventListener('fetch',e=>{
          if(e.request.method!=='GET')return;
          e.respondWith(caches.open(V).then(async cache=>{
            const cached=await cache.match(e.request);
            const fresh=fetch(e.request).then(r=>{if(r.ok&&r.status===200)cache.put(e.request,r.clone());return r;}).catch(()=>cached);
            return cached||fresh;
          }));
        });
      `;
      const sb=new Blob([swCode],{type:'text/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(sb)).catch(()=>{});
    }
  }catch(e){}
})();

/* ── Done-today (reset-hour aware) ────────────────────────────── */
const todayKey=(resetHour=4)=>{
  const now=new Date();
  const reset=new Date(now);reset.setHours(resetHour,0,0,0);
  if(now<reset)reset.setDate(reset.getDate()-1);
  return reset.toISOString().slice(0,10);
};
const getDoneToday=(resetHour=4)=>{
  try{
    const obj=JSON.parse(localStorage.getItem("sprint_done_v2")||"{}");
    const today=todayKey(resetHour);
    Object.keys(obj).forEach(k=>{if(obj[k]!==today)delete obj[k];});
    return obj;
  }catch{return{};}
};
const markDoneToday=(id,done,resetHour=4)=>{
  const obj=getDoneToday(resetHour);
  if(done)obj[id]=todayKey(resetHour);else delete obj[id];
  try{localStorage.setItem("sprint_done_v2",JSON.stringify(obj))}catch{}
};

/* ── Runner state persistence ──────────────────────────────────── */
const RKEY="sprint_runner_v23";
const saveRunnerState=s=>{try{localStorage.setItem(RKEY,JSON.stringify({...s,savedAt:Date.now()}))}catch{}};
const loadRunnerState=()=>{try{const s=JSON.parse(localStorage.getItem(RKEY)||"null");if(!s?.savedAt||Date.now()-s.savedAt>3600000)return null;return s;}catch{return null;}};
const clearRunnerState=()=>{try{localStorage.removeItem(RKEY)}catch{}};

// Advance runner state through elapsed real-world time
const advanceState=(saved,tasks)=>{
  if(!saved.running||saved.phase!=="running")return saved;
  let elapsed=Math.floor((Date.now()-saved.savedAt)/1000);
  let idx=saved.taskIdx;
  let secs=saved.secs;
  let addedElapsed=elapsed;
  while(elapsed>0&&idx<tasks.length){
    if(elapsed>=secs){elapsed-=secs;idx++;if(idx<tasks.length)secs=tasks[idx].seconds||30;}
    else{secs-=elapsed;elapsed=0;}
  }
  const done=idx>=tasks.length;
  return{...saved,taskIdx:done?tasks.length-1:idx,secs:done?0:secs,elapsed:(saved.elapsed||0)+addedElapsed,phase:done?"done":"running",running:!done};
};

function InstallBanner({onDismiss}){
  const [prompt,setPrompt]=useState(null);
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone;
  useEffect(()=>{
    const h=e=>{e.preventDefault();setPrompt(e);};
    window.addEventListener("beforeinstallprompt",h);
    return()=>window.removeEventListener("beforeinstallprompt",h);
  },[]);
  if(isStandalone)return null;
  if(!isIOS&&!prompt)return null;
  const install=async()=>{
    if(prompt){prompt.prompt();const r=await prompt.userChoice;if(r.outcome==="accepted")onDismiss();}
  };
  return(
    <div style={{background:"#0a140a",border:`1px solid ${GREEN}44`,borderRadius:10,
      padding:"12px 14px",margin:"0 0 10px",display:"flex",alignItems:"flex-start",gap:10}}>

      <div style={{flex:1}}>

        {isIOS

        }

    </div>
  );
}

/* ── Per-sprint task skip state (resets daily) ─────────────────── */
const getSkipped=(sprintId,resetHour=4)=>{
  try{
    const obj=JSON.parse(localStorage.getItem("sprint_skipped_v2")||"{}");
    const today=todayKey(resetHour);
    Object.keys(obj).forEach(k=>{if(obj[k].day!==today)delete obj[k];});
    return new Set(obj[sprintId]?.ids||[]);
  }catch{return new Set();}
};
const saveSkipped=(sprintId,ids,resetHour=4)=>{
  try{
    const obj=JSON.parse(localStorage.getItem("sprint_skipped_v2")||"{}");
    const today=todayKey(resetHour);
    Object.keys(obj).forEach(k=>{if(obj[k].day!==today)delete obj[k];});
    if(ids.size===0)delete obj[sprintId];
    else obj[sprintId]={day:today,ids:[...ids]};
    localStorage.setItem("sprint_skipped_v2",JSON.stringify(obj));
  }catch{}
};

/* ── Sprint Preview (tap card body to open) ────────────────────── */
function SprintPreview({sprint,settings,onClose,onRun}){
  const resetHour=settings.resetHour??4;
  const [skipped,setSkipped]=useState(()=>getSkipped(sprint.id,resetHour));
  const tasks=sprint.tasks||[];
  const activeTasks=tasks.filter(t=>!skipped.has(t.id));

  const toggle=id=>{
    setSkipped(prev=>{
      const next=new Set(prev);
      if(next.has(id))next.delete(id);else next.add(id);
      saveSkipped(sprint.id,next,resetHour);
      return next;
    });
  };
  const resetAll=()=>{setSkipped(new Set());saveSkipped(sprint.id,new Set(),resetHour);};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",zIndex:500,display:"flex",alignItems:"flex-end"}}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()}
        style={{width:"100%",maxHeight:"80vh",display:"flex",flexDirection:"column",
          background:"#111",borderRadius:"16px 16px 0 0",
          border:`1px solid ${BORDER}`,borderBottom:"none"}}>

        {/* Header */}
        <div style={{padding:"16px 16px 12px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <span style={{fontSize:22}}>{sprint.emoji||"⚡"}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:800,fontSize:15,color:TEXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sprint.name}</div>
            <div style={{fontSize:11,color:MUTED,marginTop:1}}>
              {skipped.size>0
                ?<span>Skipping <span style={{color:ORANGE,fontWeight:700}}>{skipped.size}</span> task{skipped.size!==1?"s":""} · <span style={{color:LIME,fontWeight:700}}>{activeTasks.length}</span> will run</span>
                :<span>{tasks.length} tasks · {fmtSecs(totalSecs(tasks))} total</span>}
            </div>
          </div>
          {skipped.size>0&&(
            <button onClick={resetAll} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${BORDER}`,
              background:"transparent",color:MUTED,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
              Reset
            </button>
          )}
          <button onClick={onClose} style={{background:"none",border:"none",color:MUTED,fontSize:20,cursor:"pointer",lineHeight:1,padding:"2px 6px"}}>✕</button>
        </div>

        <div style={{fontSize:10,color:MUTED,letterSpacing:2,fontWeight:700,padding:"0 16px 8px"}}>
          TAP TO SKIP FROM RUN
        </div>

        {/* Task list */}
        <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
          {tasks.map((t,i)=>{
            const isSkipped=skipped.has(t.id);
            return(
              <button key={t.id} onClick={()=>toggle(t.id)}
                style={{width:"100%",display:"flex",alignItems:"center",gap:10,
                  padding:"10px 12px",borderRadius:9,marginBottom:6,cursor:"pointer",
                  background:isSkipped?"#0e0a00":CARD2,
                  border:`1px solid ${isSkipped?ORANGE+"44":BORDER}`,
                  textAlign:"left",fontFamily:"inherit",transition:"all .15s"}}>
                {/* Checkbox */}
                <div style={{width:20,height:20,borderRadius:5,flexShrink:0,
                  border:`2px solid ${isSkipped?ORANGE:BORDER}`,
                  background:isSkipped?ORANGE+"22":"transparent",
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {isSkipped&&<span style={{color:ORANGE,fontSize:11,fontWeight:900,lineHeight:1}}>✕</span>}
                </div>
                <span style={{fontSize:10,color:MUTED,width:16,textAlign:"right",flexShrink:0}}>{i+1}.</span>
                <span style={{flex:1,fontSize:13,color:isSkipped?MUTED:TEXT,
                  textDecoration:isSkipped?"line-through":"none",
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {t.title}
                </span>
                {t.notes&&!isSkipped&&<span style={{fontSize:10,color:ORANGE,flexShrink:0}}>📝</span>}
                <span style={{fontSize:11,color:isSkipped?BORDER:ORANGE,flexShrink:0,fontVariantNumeric:"tabular-nums"}}>

        {/* Run button */}
        <div style={{padding:"10px 16px 32px",borderTop:`1px solid ${BORDER}`,flexShrink:0}}>
          <button onClick={()=>onRun({...sprint,tasks:activeTasks})}
            disabled={activeTasks.length===0}
            style={{width:"100%",padding:"14px",borderRadius:10,border:"none",
              background:activeTasks.length===0?"#2a2a2a":LIME,
              color:activeTasks.length===0?MUTED:"#000",
              fontWeight:900,fontSize:15,cursor:activeTasks.length===0?"default":"pointer",fontFamily:"inherit"}}>
            {activeTasks.length===0?"No tasks to run":`▶ Run ${activeTasks.length} Task${activeTasks.length!==1?"s":""} · ${fmtSecs(totalSecs(activeTasks))}`}

        </div>
      </div>
    </div>
  );
}

/* ── Sprint List ───────────────────────────────────────────────── */
function SprintList({user,sprints,loading,settings,onRun,onEdit,onCreate,onDuplicate,onDelete,onRefresh,onShowHistory,onShowSettings,onPreview}){
  const resetHour=settings.resetHour??4;
  const [doneMap,setDoneMap]=useState(()=>getDoneToday(resetHour));
  const [orderIds,setOrderIds]=useState(()=>getOrder(user?.id));
  const [showInstall,setShowInstall]=useState(()=>{try{return!localStorage.getItem("sprint_install_dismissed")}catch{return true}});

  // Refresh doneMap when resetHour changes
  useEffect(()=>setDoneMap(getDoneToday(resetHour)),[resetHour]);

  const toggleDone=id=>{
    markDoneToday(id,!doneMap[id],resetHour);
    setDoneMap(getDoneToday(resetHour));
  };

  // Apply manual order, then sort by scheduled_time within
  const displayed=useMemo(()=>{
    if(orderIds){
      const ordered=[];
      orderIds.forEach(id=>{const s=sprints.find(x=>x.id===id);if(s)ordered.push(s);});
      sprints.forEach(s=>{if(!orderIds.includes(s.id))ordered.push(s);});
      return ordered;
    }
    return [...sprints].sort((a,b)=>{
      if(a.scheduled_time&&b.scheduled_time)return a.scheduled_time.localeCompare(b.scheduled_time);
      if(a.scheduled_time)return -1;if(b.scheduled_time)return 1;return 0;
    });
  },[sprints,orderIds]);

  const doneCount=displayed.filter(s=>!!doneMap[s.id]).length;

  /* ── Drag to reorder ── */
  const [dragIdx,setDragIdx]=useState(null);
  const [dropIdx,setDropIdx]=useState(null);
  const dragTimerRef=useRef(null);
  const listRef=useRef(null);
  const dragActive=useRef(false);

  const handleHandlePointerDown=useCallback((e,idx)=>{
    e.preventDefault();
    const startY=e.clientY||e.touches?.[0]?.clientY||0;
    dragTimerRef.current=setTimeout(()=>{
      dragActive.current=true;
      setDragIdx(idx);setDropIdx(idx);
      try{navigator.vibrate&&navigator.vibrate(40);}catch{}
    },280);
  },[]);

  const handlePointerMove=useCallback(e=>{
    if(!dragActive.current)return;
    const clientY=e.clientY||(e.touches?.[0]?.clientY||0);
    const list=listRef.current;if(!list)return;
    const cards=list.querySelectorAll("[data-drag-item]");
    let target=dragIdx;
    cards.forEach((card,i)=>{
      const rect=card.getBoundingClientRect();
      if(clientY>rect.top+rect.height/2)target=i;
    });
    setDropIdx(target);
  },[dragIdx]);

  const handlePointerUp=useCallback(()=>{
    clearTimeout(dragTimerRef.current);
    if(dragActive.current&&dragIdx!==null&&dropIdx!==null&&dragIdx!==dropIdx){
      const newOrder=[...displayed];
      const [removed]=newOrder.splice(dragIdx,1);
      newOrder.splice(dropIdx,0,removed);
      const ids=newOrder.map(s=>s.id);
      setOrderIds(ids);
      saveOrder(user?.id,ids);
    }
    dragActive.current=false;
    setDragIdx(null);setDropIdx(null);
  },[dragIdx,dropIdx,displayed,user]);

  useEffect(()=>{
    window.addEventListener("pointermove",handlePointerMove,{passive:true});
    window.addEventListener("pointerup",handlePointerUp);
    window.addEventListener("touchmove",handlePointerMove,{passive:true});
    window.addEventListener("touchend",handlePointerUp);
    return()=>{
      window.removeEventListener("pointermove",handlePointerMove);
      window.removeEventListener("pointerup",handlePointerUp);
      window.removeEventListener("touchmove",handlePointerMove);
      window.removeEventListener("touchend",handlePointerUp);
    };
  },[handlePointerMove,handlePointerUp]);

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000"}}>

      {/* Header */}
      <div style={{padding:"18px 18px 14px",borderBottom:`1px solid ${BORDER}`,
        display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:22,letterSpacing:-2,lineHeight:1}}>
            <span style={{color:LIME}}>⚡</span><span style={{color:TEXT}}> SPRINT</span>
          </div>
          <div style={{fontSize:10,color:MUTED,letterSpacing:3,marginTop:2}}>v2.4</div>
        </div>
        {displayed.length>0&&(
          <div style={{background:doneCount===displayed.length?"#0a1f0a":INSET,
            border:`1px solid ${doneCount===displayed.length?GREEN+"44":BORDER}`,
            borderRadius:8,padding:"4px 10px",display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:13,color:doneCount===displayed.length?GREEN:MUTED,fontWeight:700}}>
              {doneCount}/{displayed.length}
            </span>
            <span style={{fontSize:10,color:doneCount===displayed.length?GREEN:MUTED}}>done</span>
          </div>
        )}
        <DotMenu items={[
          {label:"↻ Refresh",action:onRefresh},
          {label:"📊 Run History",action:onShowHistory},
          {label:"⚙️ Settings",action:onShowSettings},
          "---",
          {label:"Sign Out",danger:true,action:()=>db.auth.signOut()},
        ]}/>
      </div>

      {/* List */}
      <div ref={listRef} style={{flex:1,overflowY:"auto",padding:"12px 16px",
        userSelect:dragIdx!==null?"none":"auto"}}>

        {showInstall&&<InstallBanner onDismiss={()=>{setShowInstall(false);try{localStorage.setItem("sprint_install_dismissed","1")}catch{}}}/>}

        {loading&&<div style={{display:"flex",justifyContent:"center",paddingTop:60}}><Spinner size={24}/></div>}

        {!loading&&displayed.length===0&&(
          <div style={{textAlign:"center",padding:"80px 0",color:MUTED}}>
            <div style={{fontSize:52,marginBottom:14}}>⚡</div>
            <div style={{fontSize:16,fontWeight:800,color:TEXT,marginBottom:8}}>No sprints yet</div>
            <div style={{fontSize:13,lineHeight:1.6}}>Create a sprint with ordered tasks.<br/>Set a time and check them off throughout the day.</div>
          </div>
        )}

        {!loading&&displayed.map((sp,i)=>{
          const done=!!doneMap[sp.id];
          const isDragging=dragIdx===i;
          const isDropTarget=dropIdx===i&&dragIdx!==null&&dragIdx!==i;
          return(
            <div key={sp.id} data-drag-item
              style={{background:done?"#0a0f0a":isDragging?"#1a1a1a":CARD,
                borderRadius:12,
                border:`1px solid ${isDropTarget?LIME:done?GREEN+"33":BORDER}`,
                borderTop:isDropTarget?`2px solid ${LIME}`:undefined,
                padding:"13px 14px",marginBottom:9,
                transition:"opacity .2s,border .15s",
                opacity:isDragging?0.45:done?0.62:1,
                cursor:dragIdx!==null?"grabbing":"default",
                transform:isDragging?"scale(0.97)":"none"}}>

              <div style={{display:"flex",alignItems:"center",gap:8}}>

                {/* Drag handle */}
                <div
                  onPointerDown={e=>handleHandlePointerDown(e,i)}
                  style={{cursor:"grab",padding:"4px 6px",color:BORDER,fontSize:14,
                    flexShrink:0,touchAction:"none",userSelect:"none",lineHeight:1}}>
                  ⠿
                </div>

                {/* Check-off */}
                <button onClick={()=>toggleDone(sp.id)}
                  style={{width:26,height:26,borderRadius:"50%",flexShrink:0,cursor:"pointer",
                    border:`2px solid ${done?GREEN:BORDER}`,background:done?GREEN:"transparent",
                    display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                  {done&&<span style={{color:"#000",fontSize:12,fontWeight:900,lineHeight:1}}>✓</span>}
                </button>

                <span style={{fontSize:22,flexShrink:0,cursor:"pointer"}} onClick={()=>onPreview(sp)}>{sp.emoji||"⚡"}</span>

                <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onPreview(sp)}>
                  <div style={{fontWeight:800,fontSize:14,color:done?"#30D158aa":TEXT,
                    textDecoration:done?"line-through":"none",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {sp.name}
                  </div>
                  <div style={{fontSize:11,color:MUTED,marginTop:2,display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                    {sp.scheduled_time&&<span style={{color:ORANGE,fontWeight:700}}>{fmtTime12(sp.scheduled_time)}</span>}
                    {sp.scheduled_time&&<span style={{color:BORDER}}>·</span>}
                    <span>{(sp.tasks||[]).length} tasks</span>
                    {totalSecs(sp.tasks)>0&&<><span style={{color:BORDER}}>·</span><span style={{color:ORANGE}}>{fmtSecs(totalSecs(sp.tasks))}</span></>}
                  </div>
                </div>

                <div style={{display:"flex",gap:5,flexShrink:0,alignItems:"center"}}>
                  <button onClick={()=>onEdit(sp)}
                    style={{padding:"5px 9px",borderRadius:7,border:`1px solid ${BORDER}`,
                      background:"transparent",color:MUTED,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
                    Edit
                  </button>
                  <button onClick={()=>onRun(sp)}
                    style={{padding:"6px 13px",borderRadius:7,border:"none",
                      background:LIME,color:"#000",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                    ▶ Run
                  </button>
                  <DotMenu items={[
                    {label:"▶ Run sprint",action:()=>onRun(sp)},
                    {label:"Edit sprint",action:()=>onEdit(sp)},
                    {label:"Duplicate sprint",action:()=>onDuplicate(sp)},
                    "---",
                    {label:done?"Unmark done":"Mark done today",action:()=>toggleDone(sp.id)},
                    "---",
                    {label:"Delete sprint",danger:true,action:()=>onDelete(sp.id,sp.name)},
                  ]}/>
                </div>
              </div>

              {/* Task chips */}
              {(sp.tasks||[]).length>0&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${BORDER}`,
                  display:"flex",gap:5,overflowX:"auto",scrollbarWidth:"none"}}>
                  {(sp.tasks||[]).map((t,ti)=>(
                    <div key={t.id||ti}
                      style={{flexShrink:0,background:INSET,borderRadius:6,padding:"4px 8px",
                        border:`1px solid ${BORDER}`,maxWidth:130}}>
                      <div style={{fontSize:9,color:LIME,fontWeight:700,marginBottom:1}}>{fmtSecs(t.seconds||0)}</div>
                      <div style={{fontSize:10,color:TEXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {t.title||"Untitled"}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{padding:"12px 16px 22px",borderTop:`1px solid ${BORDER}`,flexShrink:0}}>
        <button onClick={onCreate}
          style={{width:"100%",padding:"14px",borderRadius:10,border:"none",
            background:LIME,color:"#000",fontWeight:900,fontSize:15,fontFamily:"inherit",cursor:"pointer"}}>
          + New Sprint
        </button>
      </div>
    </div>
  );
}

/* ── Sprint Editor ─────────────────────────────────────────────── */
const SEC_PRESETS=[15,30,45,60,90,120,180,300];

function SprintEditor({sprint,onSave,onCancel,onDelete}){
  const isNew=!sprint?.id;
  const [name,setName]=useState(sprint?.name||"");
  const [emoji,setEmoji]=useState(sprint?.emoji||"⚡");
  const [scheduledTime,setScheduledTime]=useState(sprint?.scheduled_time||"");
  const [tasks,setTasks]=useState((sprint?.tasks||[]).map(t=>({...t})));
  const [newTitle,setNewTitle]=useState("");
  const [newSecs,setNewSecs]=useState(30);
  const [saving,setSaving]=useState(false);
  const [expandedNote,setExpandedNote]=useState(null); // task id
  const newTitleRef=useRef(null);

  const addTask=()=>{
    if(!newTitle.trim())return;
    setTasks(ts=>[...ts,{id:genId(),title:newTitle.trim(),seconds:Math.max(1,Number(newSecs)||30),notes:""}]);
    setNewTitle("");setTimeout(()=>newTitleRef.current?.focus(),50);
  };
  const delTask=id=>setTasks(ts=>ts.filter(t=>t.id!==id));
  const updTask=(id,k,v)=>setTasks(ts=>ts.map(t=>t.id===id?{...t,[k]:v}:t));
  const moveUp=i=>{if(i===0)return;const a=[...tasks];[a[i-1],a[i]]=[a[i],a[i-1]];setTasks(a);};
  const moveDn=i=>{if(i===tasks.length-1)return;const a=[...tasks];[a[i],a[i+1]]=[a[i+1],a[i]];setTasks(a);};

  const save=async()=>{
    if(!name.trim())return;setSaving(true);
    await onSave({...(sprint||{}),name:name.trim(),emoji,scheduled_time:scheduledTime||null,tasks});
    setSaving(false);
  };
  const inp={padding:"10px 12px",borderRadius:8,border:`1px solid ${BORDER}`,background:CARD,color:TEXT,fontSize:14,fontFamily:"inherit",outline:"none"};

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000"}}>
      <div style={{padding:"16px 18px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={onCancel} style={{background:"none",border:"none",color:MUTED,fontSize:26,cursor:"pointer",lineHeight:1,padding:"0 4px",marginLeft:-4}}>‹</button>
        <div style={{flex:1,fontWeight:800,fontSize:16,color:TEXT}}>{isNew?"New Sprint":"Edit Sprint"}</div>
        {!isNew&&<DotMenu items={[{label:"Delete sprint",danger:true,action:onDelete}]}/>}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px 18px"}}>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <input value={emoji} onChange={e=>setEmoji(e.target.value)} style={{...inp,width:52,textAlign:"center",fontSize:22,padding:"8px 4px"}}/>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Sprint name…" style={{...inp,flex:1,fontSize:15,fontWeight:700}}/>
        </div>

        <div style={{marginBottom:22}}>
          <div style={{fontSize:10,color:MUTED,letterSpacing:2,fontWeight:700,marginBottom:8}}>
            SCHEDULED TIME <span style={{color:BORDER,fontWeight:400,letterSpacing:0,fontSize:10}}> — optional, sorts your day</span>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input type="time" value={scheduledTime} onChange={e=>setScheduledTime(e.target.value)}
              style={{...inp,flex:1,color:scheduledTime?ORANGE:MUTED,fontWeight:scheduledTime?700:400}}/>
            {scheduledTime&&<button onClick={()=>setScheduledTime("")}
              style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:7,padding:"10px 12px",color:MUTED,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Clear</button>}
          </div>
          {scheduledTime&&<div style={{fontSize:11,color:ORANGE,marginTop:6,fontWeight:700}}>⏰ {fmtTime12(scheduledTime)}</div>}
        </div>

        <div style={{fontSize:10,color:MUTED,letterSpacing:2,fontWeight:700,marginBottom:10}}>
          TASKS · {tasks.length}{totalSecs(tasks)>0&&` · ${fmtSecs(totalSecs(tasks))} total`}
        </div>

        {tasks.map((t,i)=>(
          <div key={t.id} style={{marginBottom:6}}>
            <div style={{background:CARD,borderRadius:expandedNote===t.id?"10px 10px 0 0":10,
              border:`1px solid ${BORDER}`,padding:"9px 12px",display:"flex",alignItems:"center",gap:7}}>
              <div style={{display:"flex",flexDirection:"column",gap:1,flexShrink:0}}>
                <button onClick={()=>moveUp(i)} disabled={i===0} style={{background:"none",border:"none",color:i===0?BORDER:MUTED,cursor:i===0?"default":"pointer",fontSize:9,lineHeight:1,padding:"2px 4px"}}>▲</button>
                <button onClick={()=>moveDn(i)} disabled={i===tasks.length-1} style={{background:"none",border:"none",color:i===tasks.length-1?BORDER:MUTED,cursor:i===tasks.length-1?"default":"pointer",fontSize:9,lineHeight:1,padding:"2px 4px"}}>▼</button>
              </div>
              <span style={{fontSize:10,color:MUTED,width:16,textAlign:"right",flexShrink:0}}>{i+1}.</span>
              <input value={t.title} onChange={e=>updTask(t.id,"title",e.target.value)}
                style={{flex:1,background:"transparent",border:"none",color:TEXT,fontSize:13,fontFamily:"inherit",outline:"none",minWidth:0}}/>
              {/* Notes toggle */}
              <button onClick={()=>setExpandedNote(expandedNote===t.id?null:t.id)}
                style={{background:"none",border:"none",color:t.notes?ORANGE:BORDER,cursor:"pointer",
                  fontSize:13,padding:"0 4px",lineHeight:1,flexShrink:0,transition:"color .15s"}}

              <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                <button onClick={()=>updTask(t.id,"seconds",Math.max(5,t.seconds-5))}
                  style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:5,width:22,height:22,color:MUTED,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>−</button>
                <div style={{minWidth:38,textAlign:"center",fontSize:12,color:LIME,fontWeight:800,fontVariantNumeric:"tabular-nums"}}>{fmtSecs(t.seconds)}</div>
                <button onClick={()=>updTask(t.id,"seconds",t.seconds+5)}
                  style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:5,width:22,height:22,color:MUTED,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>+</button>
              </div>
              <button onClick={()=>delTask(t.id)}
                style={{background:"none",border:"none",color:"#FF453A33",cursor:"pointer",fontSize:14,padding:"0 2px",transition:"color .15s",lineHeight:1,flexShrink:0}}
                onMouseEnter={e=>e.currentTarget.style.color=RED}
                onMouseLeave={e=>e.currentTarget.style.color="#FF453A33"}>✕</button>
            </div>
            {expandedNote===t.id&&(
              <div style={{background:"#0a0a10",borderRadius:"0 0 10px 10px",border:`1px solid ${BORDER}`,borderTop:"none",padding:"10px 12px"}}>
                <textarea value={t.notes||""} onChange={e=>updTask(t.id,"notes",e.target.value)}
                  placeholder="Notes for this task (shown mid-run)…"
                  rows={2}
                  style={{width:"100%",background:"transparent",border:"none",color:TEXT,fontSize:13,fontFamily:"inherit",outline:"none",resize:"none",lineHeight:1.5}}/>
              </div>
            )}
          </div>
        ))}

        {tasks.length===0&&(
          <div style={{textAlign:"center",padding:"32px 0",color:MUTED,fontSize:13,fontStyle:"italic",border:`1px dashed ${BORDER}`,borderRadius:10,marginBottom:12}}>No tasks yet — add one below</div>
        )}

        {/* Add task */}
        <div style={{background:INSET,borderRadius:10,border:`1px solid ${BORDER}`,padding:"14px",marginTop:8}}>
          <div style={{fontSize:10,color:MUTED,letterSpacing:2,marginBottom:10,fontWeight:700}}>ADD TASK</div>
          <input ref={newTitleRef} value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="Task name…" style={{...inp,width:"100%",marginBottom:10}}/>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:MUTED,flexShrink:0}}>Duration:</span>
            <button onClick={()=>setNewSecs(s=>Math.max(5,s-5))} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:6,width:28,height:28,color:MUTED,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
            <span style={{fontSize:15,fontWeight:800,color:LIME,minWidth:48,textAlign:"center",fontVariantNumeric:"tabular-nums",flexShrink:0}}>{fmtSecs(newSecs)}</span>
            <button onClick={()=>setNewSecs(s=>s+5)} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:6,width:28,height:28,color:MUTED,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
            {SEC_PRESETS.map(s=>(
              <button key={s} onClick={()=>setNewSecs(s)}
                style={{padding:"4px 9px",borderRadius:6,fontSize:10,fontFamily:"inherit",fontWeight:700,cursor:"pointer",
                  background:newSecs===s?LIME:CARD,color:newSecs===s?"#000":MUTED,border:`1px solid ${newSecs===s?LIME:BORDER}`}}>
                {s<60?s+"s":s%60===0?`${s/60}m`:`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`}
              </button>
            ))}
          </div>
          <button onClick={addTask}
            style={{width:"100%",padding:"10px",borderRadius:8,border:"none",
              background:newTitle.trim()?LIME:"#1a1a1a",color:newTitle.trim()?"#000":MUTED,
              fontWeight:800,fontSize:13,cursor:newTitle.trim()?"pointer":"default",fontFamily:"inherit",transition:"all .15s"}}>
            + Add Task
          </button>
        </div>
      </div>

      <div style={{padding:"12px 18px 20px",borderTop:`1px solid ${BORDER}`,display:"flex",gap:8,flexShrink:0}}>
        <button onClick={onCancel} style={{flex:1,padding:"12px",borderRadius:9,border:`1px solid ${BORDER}`,background:"transparent",color:MUTED,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>Cancel</button>
        <button onClick={save} disabled={saving||!name.trim()}
          style={{flex:2,padding:"12px",borderRadius:9,border:"none",
            background:saving||!name.trim()?"#2a2a2a":LIME,color:saving||!name.trim()?MUTED:"#000",
            cursor:saving||!name.trim()?"default":"pointer",fontWeight:900,fontFamily:"inherit",fontSize:14,
            display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {saving&&<Spinner size={14} color={MUTED}/>}{saving?"Saving…":"Save Sprint"}
        </button>
      </div>
    </div>
  );
}

/* ── Sprint Runner ─────────────────────────────────────────────── */
function SprintRunner({sprint,user,onClose,onLogRun,onComplete}){
  const tasks=useMemo(()=>sprint.tasks||[],[sprint]);
  const restore=sprint._restore;

  // State — init from restore if available
  const [taskIdx,setTaskIdx]=useState(()=>restore?.taskIdx??0);
  const [secs,setSecs]=useState(()=>restore?.secs??(tasks[0]?.seconds||30));
  const [elapsed,setElapsed]=useState(()=>restore?.elapsed??0);
  const [running,setRunning]=useState(()=>!!(restore?.running));
  const [phase,setPhase]=useState(()=>restore?.phase??"idle");
  const [ringSize,setRingSize]=useState(300);
  const [transitioning,setTransitioning]=useState(false);
  const [expandedNote,setExpandedNote]=useState(false);

  const containerRef=useRef(null);
  const tickRef=useRef(null);
  const elapsedRef=useRef(null);
  const taskIdxRef=useRef(taskIdx);
  const secsRef=useRef(secs);
  const tasksRef=useRef(tasks);
  const runningRef=useRef(running);
  const transitioningRef=useRef(false);
  const phaseRef=useRef(phase);

  useEffect(()=>{taskIdxRef.current=taskIdx;},[taskIdx]);
  useEffect(()=>{secsRef.current=secs;},[secs]);
  useEffect(()=>{tasksRef.current=tasks;},[tasks]);
  useEffect(()=>{runningRef.current=running;},[running]);
  useEffect(()=>{transitioningRef.current=transitioning;},[transitioning]);
  useEffect(()=>{phaseRef.current=phase;},[phase]);

  // Responsive ring
  useEffect(()=>{
    const el=containerRef.current;if(!el)return;
    const obs=new ResizeObserver(e=>{const w=e[0].contentRect.width;setRingSize(Math.min(Math.max(w-12,240),420));});
    obs.observe(el);return()=>obs.disconnect();
  },[]);

  // Wake lock
  useEffect(()=>{
    if(phase==="running"){acqWakeLock();document.addEventListener("visibilitychange",reacqWakeLock);}
    else{relWakeLock();document.removeEventListener("visibilitychange",reacqWakeLock);}
    return()=>{relWakeLock();document.removeEventListener("visibilitychange",reacqWakeLock);};
  },[phase]);

  // Tab title countdown
  useEffect(()=>{
    const cur=tasks[taskIdx];
    if(phase==="running"&&cur){
      document.title=`⚡ ${fmtSecs(secs)} — ${cur.title}`;
    }else if(phase==="done"){document.title="✓ Sprint Complete";}
    else{document.title="SPRINT v2.3";}
    return()=>{document.title="SPRINT v2.3";};
  },[secs,phase,taskIdx,tasks]);

  // Persist state every tick
  useEffect(()=>{
    if(phase==="idle"||phase==="done"){clearRunnerState();return;}
    saveRunnerState({sprintId:sprint.id,taskIdx,secs,elapsed,phase,running});
  },[taskIdx,secs,elapsed,phase,running]);

  // Notify permission on mount
  useEffect(()=>{askNotifPerm();},[]);

  // Reset note expansion on task change
  useEffect(()=>{setExpandedNote(false);},[taskIdx]);

  // Elapsed tick
  useEffect(()=>{
    clearInterval(elapsedRef.current);
    if(running&&phase==="running"){
      elapsedRef.current=setInterval(()=>setElapsed(e=>e+1),1000);
    }
    return()=>clearInterval(elapsedRef.current);
  },[running,phase]);

  const currentTask=tasks[taskIdx]||null;
  const upcomingTasks=tasks.slice(taskIdx+1);
  const totalRemaining=useMemo(()=>tasks.slice(taskIdx).reduce((a,t,i)=>a+(i===0?secs:(t.seconds||0)),0),[tasks,taskIdx,secs]);

  const goToTask=useCallback((idx)=>{
    clearInterval(tickRef.current);
    setTransitioning(false);transitioningRef.current=false;
    if(idx>=tasks.length){
      setPhase("done");setRunning(false);runningRef.current=false;
      clearInterval(elapsedRef.current);
      try{window.speechSynthesis.cancel();}catch{}
      clearRunnerState();
      setTimeout(()=>{chime();speak("Sprint complete! Great work.");},100);
      return;
    }
    const task=tasks[idx];
    setTaskIdx(idx);setSecs(task.seconds||30);
    showTaskNotif(task,idx+1,tasks.length);
    setTimeout(()=>speak(task.title),200);
  },[tasks]);

  // Main tick — side effects NEVER inside a setState updater (React 18 may call updaters multiple times)
  useEffect(()=>{
    if(!running||phase!=="running")return;
    clearInterval(tickRef.current);
    tickRef.current=setInterval(()=>{
      if(!runningRef.current||transitioningRef.current)return;
      const cur=secsRef.current;
      const n=cur-1;

      // Countdown cues
      if(n===3)speak("Three");
      else if(n===2)speak("Two");
      else if(n===1)speak("One");

      if(n<=0){
        // Task complete — all side effects here, NOT inside setState
        setSecs(0);
        clearInterval(tickRef.current);
        setTransitioning(true);
        transitioningRef.current=true;
        beep(880,200);
        const next=taskIdxRef.current+1;
        const tks=tasksRef.current;
        const last=next>=tks.length;
        if(!last){beep(660,120,0.18);setTimeout(()=>speak(tks[next].title),180);}
        setTimeout(()=>goToTask(next),last?400:1400);
      }else{
        setSecs(n);
      }
    },1000);
    return()=>clearInterval(tickRef.current);
  },[running,phase,goToTask]);

  // Auto-start if restoring a running sprint
  useEffect(()=>{
    if(restore?.running&&restore?.phase==="running"&&phase==="running"){
      setRunning(true);runningRef.current=true;
    }
  },[]);

  // Log run + auto-mark sprint done when completed
  const loggedRef=useRef(false);
  useEffect(()=>{
    if(phase==="done"&&!loggedRef.current){
      loggedRef.current=true;
      onLogRun&&onLogRun(sprint.id,sprint.name,sprint.emoji||"⚡",tasks.length,totalSecs(tasks),elapsed);
      onComplete&&onComplete(sprint.id);
    }
  },[phase]);

  const startSprint=()=>{
    if(tasks.length===0)return;
    setPhase("running");setRunning(true);runningRef.current=true;
    setTaskIdx(0);setSecs(tasks[0].seconds||30);taskIdxRef.current=0;setElapsed(0);
    showTaskNotif(tasks[0],1,tasks.length);
    setTimeout(()=>speak(tasks[0].title),100);
  };
  const togglePause=()=>{
    if(running){setRunning(false);runningRef.current=false;clearInterval(tickRef.current);clearInterval(elapsedRef.current);try{window.speechSynthesis.cancel();}catch{}}
    else{setRunning(true);runningRef.current=true;speak(currentTask?.title||"Resuming");}
  };
  const skipTask=()=>{clearInterval(tickRef.current);goToTask(taskIdxRef.current+1);};
  const prevTask=()=>{if(taskIdx===0)return;clearInterval(tickRef.current);goToTask(taskIdxRef.current-1);};
  const stopSprint=()=>{
    clearInterval(tickRef.current);clearInterval(elapsedRef.current);
    setRunning(false);runningRef.current=false;setPhase("idle");
    setTaskIdx(0);setSecs(tasks[0]?.seconds||30);setElapsed(0);setTransitioning(false);
    clearRunnerState();
    try{window.speechSynthesis.cancel();}catch{}
  };

  // Ring math
  const taskTotal=currentTask?.seconds||1;
  const pct=Math.max(0,Math.min(1,secs/taskTotal));
  const ringColor=secs>30?LIME:secs>10?ORANGE:RED;
  const R=ringSize/2*0.88,CX=ringSize/2,CY=ringSize/2,C=2*Math.PI*R,sw=Math.round(ringSize*0.09);

  /* ── Done screen ── */
  if(phase==="done"){
    return(
      <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#000",gap:16,padding:32,textAlign:"center"}}>
        <div style={{fontSize:60,marginBottom:8}}>🎉</div>
        <div style={{fontSize:32,fontWeight:900,color:LIME,letterSpacing:-2}}>SPRINT COMPLETE</div>
        <div style={{fontSize:16,color:MUTED}}>{sprint.emoji||"⚡"} {sprint.name}</div>
        <div style={{display:"flex",gap:12,marginTop:8,flexWrap:"wrap",justifyContent:"center"}}>
          {[["TASKS",tasks.length,TEXT],["ELAPSED",fmtSecs(elapsed),LIME],["PLANNED",fmtSecs(totalSecs(tasks)),ORANGE]].map(([label,val,col])=>(
            <div key={label} style={{background:CARD,borderRadius:10,border:`1px solid ${BORDER}`,padding:"12px 18px"}}>
              <div style={{fontSize:10,color:MUTED,letterSpacing:2,marginBottom:4}}>{label}</div>
              <div style={{fontSize:22,fontWeight:900,color:col}}>{val}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:300,marginTop:16}}>
          <button onClick={stopSprint}
            style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:LIME,color:"#000",fontWeight:900,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>
            ↺ Run Again
          </button>
          <button onClick={onClose}
            style={{width:"100%",padding:"12px",borderRadius:10,border:`1px solid ${BORDER}`,background:"transparent",color:MUTED,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
            ← Back to Sprints
          </button>
        </div>
      </div>
    );
  }

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000"}}>

      {/* Header */}
      <div style={{padding:"14px 18px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={()=>{stopSprint();onClose();}} style={{background:"none",border:"none",color:MUTED,fontSize:26,cursor:"pointer",lineHeight:1,padding:"0 4px",marginLeft:-4}}>‹</button>
        <span style={{fontSize:20,flexShrink:0}}>{sprint.emoji||"⚡"}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:14,color:TEXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sprint.name}</div>
          <div style={{fontSize:11,color:MUTED,marginTop:1}}>{fmtSecs(totalRemaining)} remaining · {tasks.length} tasks</div>
        </div>
        {phase==="running"&&(
          <button onClick={stopSprint} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${BORDER}`,background:"transparent",color:MUTED,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Stop</button>
        )}
      </div>

      {/* Body */}
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 12px 28px",gap:16}}>

        {/* Progress dots */}
        {tasks.length>0&&(
          <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center",maxWidth:420}}>
            {tasks.map((t,i)=>(
              <div key={t.id||i} style={{width:8,height:8,borderRadius:"50%",
                background:i<taskIdx?GREEN:i===taskIdx?(phase==="running"?LIME:"#555"):"#2a2a2a",
                transition:"background .4s",boxShadow:i===taskIdx&&phase==="running"?`0 0 10px ${LIME}55`:"none"}}/>
            ))}
          </div>
        )}

        {/* Current task */}
        {currentTask&&(
          <div style={{textAlign:"center",padding:"0 8px",width:"100%",maxWidth:420}}>
            <div style={{fontSize:10,color:MUTED,letterSpacing:2,marginBottom:8,fontWeight:700}}>
              {phase==="idle"?"READY TO RUN":transitioning?"FINISHING…":running?"NOW RUNNING":"PAUSED"}
              {" · "}{taskIdx+1}/{tasks.length}
            </div>
            <div style={{fontSize:22,fontWeight:900,color:TEXT,lineHeight:1.25,transition:"opacity .3s",opacity:transitioning?0.3:1}}>
              {currentTask.title}
            </div>
            {phase==="idle"&&<div style={{fontSize:12,color:MUTED,marginTop:6}}>{fmtSecs(currentTask.seconds)} · tap Start when ready</div>}

            {/* Notes toggle */}
            {currentTask.notes&&(
              <div style={{marginTop:10}}>
                <button onClick={()=>setExpandedNote(e=>!e)}
                  style={{padding:"5px 14px",borderRadius:7,border:`1px solid ${expandedNote?ORANGE:BORDER}`,
                    background:expandedNote?"#1a0e00":"transparent",color:expandedNote?ORANGE:MUTED,
                    fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>
                  📝 {expandedNote?"Hide Notes":"View Notes"}
                </button>
                {expandedNote&&(
                  <div className="slide-down"
                    style={{marginTop:8,padding:"10px 14px",borderRadius:9,
                      background:"#0e0900",border:`1px solid ${ORANGE}33`,
                      fontSize:13,color:TEXT,lineHeight:1.6,textAlign:"left",whiteSpace:"pre-wrap"}}>
                    {currentTask.notes}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* Big ring */}
        <div ref={containerRef} style={{width:"100%",maxWidth:440,flexShrink:0}}>
          <div style={{position:"relative",width:ringSize,height:ringSize,margin:"0 auto"}}>
            <svg width={ringSize} height={ringSize} style={{transform:"rotate(-90deg)"}}>
              <circle cx={CX} cy={CY} r={R} fill="none" stroke="#1a1a1a" strokeWidth={sw}/>
              <circle cx={CX} cy={CY} r={R} fill="none"
                stroke={phase==="running"?(transitioning?ORANGE:ringColor):"#2a2a2a"}
                strokeWidth={sw} strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C*(1-pct)}
                style={{transition:"stroke-dashoffset .85s linear,stroke .35s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3}}>
              <div style={{fontSize:Math.round(ringSize*0.25),fontWeight:900,lineHeight:1,fontVariantNumeric:"tabular-nums",
                color:phase==="running"?(transitioning?ORANGE:ringColor):"#333"}}>
                {phase==="idle"?"GO":phase==="done"?"✓":fmtSecs(secs)}
              </div>
              {phase==="running"&&!transitioning&&(
                <div style={{fontSize:Math.round(ringSize*0.042),color:MUTED,letterSpacing:1}}>{running?"seconds left":"paused"}</div>
              )}
              {transitioning&&(
                <div style={{fontSize:Math.round(ringSize*0.042),color:ORANGE,letterSpacing:1}} className="pulse">NEXT UP…</div>
              )}
              {phase==="running"&&elapsed>0&&(
                <div style={{fontSize:Math.round(ringSize*0.037),color:"#2a2a2a",letterSpacing:1,marginTop:6,fontVariantNumeric:"tabular-nums"}}>
                  {fmtSecs(elapsed)} elapsed
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Controls */}
        <div style={{display:"flex",gap:14,alignItems:"center"}}>
          {phase==="idle"&&(
            <button onClick={startSprint} disabled={tasks.length===0}
              style={{padding:"14px 52px",borderRadius:10,border:"none",
                background:tasks.length===0?"#2a2a2a":LIME,color:tasks.length===0?MUTED:"#000",
                fontWeight:900,fontSize:17,cursor:tasks.length===0?"default":"pointer",fontFamily:"inherit"}}>
              ▶ Start Sprint
            </button>
          )}
          {phase==="running"&&(<>
            <button onClick={prevTask} disabled={taskIdx===0||transitioning}
              style={{width:48,height:48,borderRadius:"50%",border:`1px solid ${BORDER}`,background:CARD2,
                color:taskIdx===0||transitioning?BORDER:MUTED,cursor:taskIdx===0||transitioning?"default":"pointer",
                fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>◀</button>
            <button onClick={togglePause} disabled={transitioning}
              style={{width:64,height:64,borderRadius:"50%",border:"none",background:transitioning?"#2a2a2a":LIME,
                color:"#000",fontSize:24,cursor:transitioning?"default":"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>
              {running?"⏸":"▶"}
            </button>
            <button onClick={skipTask} disabled={transitioning}
              style={{width:48,height:48,borderRadius:"50%",border:`1px solid ${BORDER}`,background:CARD2,
                color:transitioning?BORDER:MUTED,cursor:transitioning?"default":"pointer",
                fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>▶▶</button>
          </>)}
        </div>

        {phase==="idle"&&(
          <div style={{fontSize:11,color:"#2a2a2a",textAlign:"center",lineHeight:1.7,maxWidth:300}}>
            🔊 Each task announced aloud · 🔒 Screen stays on · 📌 Tab title shows countdown
          </div>
        )}

        {/* All upcoming */}
        {upcomingTasks.length>0&&(
          <div style={{width:"100%",maxWidth:440}}>
            <div style={{fontSize:10,color:MUTED,letterSpacing:2,marginBottom:8,fontWeight:700}}>UPCOMING · {upcomingTasks.length}</div>
            {upcomingTasks.map((t,i)=>(
              <div key={t.id||i}
                style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",
                  borderRadius:9,background:CARD,border:`1px solid ${BORDER}`,marginBottom:5}}>
                <span style={{fontSize:10,color:MUTED,width:18,textAlign:"right",flexShrink:0}}>{taskIdx+2+i}.</span>
                <span style={{flex:1,fontSize:13,color:TEXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
                {t.notes&&<span style={{fontSize:11,color:ORANGE,flexShrink:0}}>📝</span>}
                <span style={{fontSize:11,color:ORANGE,flexShrink:0,fontVariantNumeric:"tabular-nums"}}>{fmtSecs(t.seconds||0)}</span>
              </div>
            ))}
          </div>
        )}

        {/* Completed */}
        {phase==="running"&&taskIdx>0&&(
          <div style={{width:"100%",maxWidth:440}}>
            <div style={{fontSize:10,color:MUTED,letterSpacing:2,marginBottom:8,fontWeight:700}}>COMPLETED</div>
            {tasks.slice(0,taskIdx).reverse().map((t,i)=>(
              <div key={t.id||i}
                style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",
                  borderRadius:9,background:"#091409",border:`1px solid #30D15822`,marginBottom:4}}>
                <span style={{color:GREEN,fontSize:11,flexShrink:0}}>✓</span>
                <span style={{flex:1,fontSize:12,color:"#30D158aa",textDecoration:"line-through",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
                <span style={{fontSize:10,color:"#30D15866",flexShrink:0}}>{fmtSecs(t.seconds||0)}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Root App ──────────────────────────────────────────────────── */
function App(){
  const [screen,setScreen]=useState("loading");
  const [user,setUser]=useState(null);
  const [sprints,setSprints]=useState([]);
  const [loadingList,setLoadingList]=useState(true);
  const [editTarget,setEditTarget]=useState(undefined);
  const [runTarget,setRunTarget]=useState(null);
  const [settings,setSettings]=useState({});
  const [showHistory,setShowHistory]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [previewTarget,setPreviewTarget]=useState(null);

  const loadSprints=useCallback(async(u)=>{
    setLoadingList(true);
    const uid=(u||user)?.id;if(!uid)return;
    const{data,error}=await db.from("sprints_v2").select("*").eq("user_id",uid).order("created_at",{ascending:true});
    if(!error)setSprints(data||[]);
    setLoadingList(false);
  },[user]);

  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{
      if(session){
        setUser(session.user);
        const s=loadSettings(session.user.id);
        setSettings(s);
        setScreen("list");
        loadSprints(session.user);
      }else setScreen("auth");
    });
    const{data:{subscription}}=db.auth.onAuthStateChange((_,session)=>{
      if(session){
        setUser(session.user);
        setSettings(loadSettings(session.user.id));
        setScreen("list");
        loadSprints(session.user);
      }else{setUser(null);setSprints([]);setScreen("auth");}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Restore running sprint after reload
  useEffect(()=>{
    if(screen!=="list"||sprints.length===0||runTarget)return;
    const saved=loadRunnerState();
    if(!saved?.sprintId)return;
    const sp=sprints.find(s=>s.id===saved.sprintId);
    if(!sp)return;
    // Advance state to account for time elapsed while away
    const advanced=advanceState(saved,sp.tasks||[]);
    if(advanced.phase==="done"){clearRunnerState();return;}
    setRunTarget({...sp,_restore:advanced});
    setScreen("run");
  },[screen,sprints]);

  const saveSprint=async data=>{
    const uid=user?.id;if(!uid)return;
    if(data.id){
      await db.from("sprints_v2").update({name:data.name,emoji:data.emoji,scheduled_time:data.scheduled_time,tasks:data.tasks}).eq("id",data.id).eq("user_id",uid);
    }else{
      await db.from("sprints_v2").insert({user_id:uid,name:data.name,emoji:data.emoji,scheduled_time:data.scheduled_time||null,tasks:data.tasks||[]});
    }
    await loadSprints(user);setEditTarget(undefined);setScreen("list");
  };

  const deleteSprint=async()=>{
    if(!editTarget?.id)return;
    await db.from("sprints_v2").delete().eq("id",editTarget.id).eq("user_id",user.id);
    await loadSprints(user);setEditTarget(undefined);setScreen("list");
  };

  const handleDelete=async(id,name)=>{
    if(!window.confirm(`Delete "${name}"?\nThis can't be undone.`))return;
    await db.from("sprints_v2").delete().eq("id",id).eq("user_id",user.id);
    await loadSprints(user);
  };

  const handleDuplicate=async sp=>{
    const uid=user?.id;if(!uid)return;
    await db.from("sprints_v2").insert({
      user_id:uid,name:`${sp.name} (copy)`,emoji:sp.emoji,
      scheduled_time:sp.scheduled_time||null,
      tasks:(sp.tasks||[]).map(t=>({...t,id:genId()}))
    });
    await loadSprints(user);
  };

  const logRun=async(sprintId,sprintName,sprintEmoji,taskCount,plannedSecs,elapsedSecs)=>{
    try{
      await db.from("sprint_runs").insert({
        user_id:user.id,sprint_id:sprintId,sprint_name:sprintName,
        sprint_emoji:sprintEmoji,task_count:taskCount,
        planned_secs:plannedSecs,elapsed_secs:elapsedSecs
      });
    }catch{}
  };

  const saveSettingsAndClose=s=>{
    setSettings(s);
    if(user?.id)persistSettings(user.id,s);
    setShowSettings(false);
  };

  if(screen==="loading")return(
    <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:"#000",flexDirection:"column",gap:16}}>
      <div style={{fontSize:36,fontWeight:900,color:LIME}}>⚡</div><Spinner size={22}/>
    </div>
  );
  if(screen==="auth")return<AuthScreen onAuth={u=>{setUser(u);setSettings(loadSettings(u.id));setScreen("list");loadSprints(u);}}/>;

  if(screen==="run"&&runTarget)return(
    <SprintRunner sprint={runTarget} user={user}
      onClose={()=>{setRunTarget(null);setScreen("list");loadSprints(user);}}
      onLogRun={logRun}
      onComplete={(id)=>{markDoneToday(id,true,settings.resetHour??4);}}
    />
  );

  if(screen==="edit")return(
    <SprintEditor sprint={editTarget} onSave={saveSprint} onCancel={()=>{setEditTarget(undefined);setScreen("list");}} onDelete={deleteSprint}/>
  );

  return(
    <>
      <SprintList user={user} sprints={sprints} loading={loadingList} settings={settings}
        onRun={sp=>{setRunTarget(sp);setScreen("run");}}
        onEdit={sp=>{setEditTarget(sp);setScreen("edit");}}
        onCreate={()=>{setEditTarget(undefined);setScreen("edit");}}
        onDuplicate={handleDuplicate}
        onDelete={handleDelete}
        onRefresh={()=>loadSprints(user)}
        onShowHistory={()=>setShowHistory(true)}
        onShowSettings={()=>setShowSettings(true)}
        onPreview={sp=>setPreviewTarget(sp)}
      />
      {previewTarget&&(
        <SprintPreview
          sprint={previewTarget}
          settings={settings}
          onClose={()=>setPreviewTarget(null)}
          onRun={sp=>{setPreviewTarget(null);setRunTarget(sp);setScreen("run");}}
        />
      )}
      {showHistory&&<HistoryPanel user={user} onClose={()=>setShowHistory(false)}/>}
      {showSettings&&<SettingsPanel settings={settings} onSave={saveSettingsAndClose} onClose={()=>setShowSettings(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
