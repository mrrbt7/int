/* ── Constants ────────────────────────────────── */

const fmtSecs=s=>{if(s<0)s=0;return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;};
const fmtTime12=t=>{if(!t)return"";const[h,m]=t.split(":");const hr=parseInt(h);return `${hr===0?12:hr>12?hr-12:hr}:${m} ${hr<12?"AM":"PM"}`;};
const fmtDate=d=>new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});

/* ── Date helpers ─────────────────────────────── */
const todayKey=(resetHour=4)=>{
  const now=new Date();
  const reset=new Date(now);
  reset.setHours(resetHour,0,0,0);
  if(now<reset)reset.setDate(reset.getDate()-1);
  return reset.toISOString().slice(0,10);
};

/* ── Daily state (cross-device via Supabase) ──── */
const resolveDS=(raw,resetHour=4)=>{
  if(!raw||!raw.date)return{date:null,done:false,skipped:[]};
  if(raw.date!==todayKey(resetHour))return{date:null,done:false,skipped:[]};
  return{date:raw.date,done:!!raw.done,skipped:Array.isArray(raw.skipped)?raw.skipped:[]};
};

/* ── Settings ─────────────────────────────────── */

const clearRunner=()=>{try{localStorage.removeItem(RKEY)}catch{}};

const advanceRunner=(saved,tasks)=>{
  if(!saved.running||saved.phase!=="running")return saved;
  let gap=Math.floor((Date.now()-saved.savedAt)/1000);
  let idx=saved.taskIdx,secs=saved.secs,elapsed=saved.elapsed||0;
  while(gap>0&&idx<tasks.length){
    if(gap>=secs){gap-=secs;elapsed+=secs;idx++;secs=idx<tasks.length?tasks[idx].seconds||30:0;}
    else{secs-=gap;elapsed+=gap;gap=0;}
  }
  const done=idx>=tasks.length;
  return{...saved,taskIdx:done?tasks.length-1:idx,secs:done?0:secs,elapsed,phase:done?"done":"running",running:!done};
};

/* ── Audio ────────────────────────────────────── */
const beep=(freq,dur,vol=0.25)=>{
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;o.type="sine";
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);
    o.start();o.stop(ctx.currentTime+dur/1000);
  }catch{}
};
const chime=()=>{beep(523,180,.2);setTimeout(()=>beep(659,180,.2),160);setTimeout(()=>beep(784,300,.25),320);};

    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("pointerdown",h);
    return()=>document.removeEventListener("pointerdown",h);
  },[open]);
  return(
    <div ref={ref} style={{position:"relative",flexShrink:0}}>
      <button onClick={e=>{e.stopPropagation();setOpen(o=>!o);}}
        style={{background:"none",border:"none",color:MUTED,fontSize:20,cursor:"pointer",padding:"4px 8px",lineHeight:1,borderRadius:7,display:"flex",alignItems:"center"}}

  const tasks=sprint.tasks||[];
  const [skipped,setSkipped]=useState(()=>new Set(resolveDS(sprint.daily_state,resetHour).skipped||[]));
  const activeTasks=tasks.filter(t=>!skipped.has(t.id));
  const toggle=id=>{
    setSkipped(prev=>{
      const next=new Set(prev);
      if(next.has(id))next.delete(id);else next.add(id);
      onSaveSkipped(sprint.id,[...next]);
      return next;
    });
  };
  const resetAll=()=>{setSkipped(new Set());onSaveSkipped(sprint.id,[]);};
  const freqLabel=sprint.frequency_days
    ?sprint.frequency_days.split(',').map(d=>DAY_LABEL[d]||d).join(' · ')
    :(sprint.frequency&&sprint.frequency>1)?`Every ${sprint.frequency}d`:'Daily';
  return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:500,display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{padding:"14px 16px 12px",borderBottom:`1px solid ${BORDER}`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <button onClick={onClose} style={{background:"none",border:"none",color:MUTED,fontSize:26,cursor:"pointer",lineHeight:1,padding:"0 4px",marginLeft:-4}}>‹</button>
          <span style={{fontSize:24,flexShrink:0}}>{sprint.emoji||"⚡"}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:900,fontSize:16,color:TEXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sprint.name}</div>
            <div style={{fontSize:11,color:MUTED,marginTop:1}}>
              {skipped.size>0
                ?<span>Excluding <span style={{color:ORANGE,fontWeight:700}}>{skipped.size}</span> · <span style={{color:LIME,fontWeight:700}}>{activeTasks.length}</span> active</span>
                :<span>{tasks.length} tasks · {fmtSecs(totalSecs(tasks))}</span>}
            </div>
          </div>
        </div>
        {/* Action buttons row */}
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          <button onClick={()=>onEdit(sprint)}
            style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:8,border:`1px solid ${BORDER}`,background:"transparent",color:TEXT,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>
            ✏️ <span>Edit</span>
          </button>
          <button onClick={()=>onDuplicate(sprint)}
            style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:8,border:`1px solid ${BORDER}`,background:"transparent",color:TEXT,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>
            📋 <span>Duplicate</span>
          </button>
          {skipped.size>0&&(
            <button onClick={resetAll}
              style={{padding:"7px 12px",borderRadius:8,border:`1px solid ${BORDER}`,background:"transparent",color:MUTED,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
              ↺ Reset
            </button>
          )}
          <div style={{flex:1}}/>
          {sprint.scheduled_time&&<span style={{fontSize:11,color:ORANGE,fontWeight:700}}>{fmtTime12(sprint.scheduled_time)}</span>}
          <span style={{fontSize:11,color:MUTED,background:INSET,border:`1px solid ${BORDER}`,borderRadius:6,padding:"3px 8px"}}>{freqLabel}</span>
        </div>
      </div>

      {/* Task list */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 16px 8px"}}>
        <div style={{fontSize:10,color:MUTED,letterSpacing:2,fontWeight:700,marginBottom:8}}>ALL TASKS — TAP TO EXCLUDE</div>
        {tasks.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:MUTED,fontSize:13}}>No tasks in this sprint yet.</div>}
        {tasks.map((t,i)=>{
          const isEx=skipped.has(t.id);
          return(
            <button key={t.id} onClick={()=>toggle(t.id)}
              style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"11px 12px",borderRadius:10,marginBottom:6,cursor:"pointer",background:isEx?"#0e0a00":CARD2,border:`1px solid ${isEx?ORANGE+"44":GREEN+"33"}`,textAlign:"left",fontFamily:"inherit",transition:"all .15s"}}>
              <div style={{width:22,height:22,borderRadius:5,flexShrink:0,border:`2px solid ${isEx?ORANGE:GREEN}`,background:isEx?"transparent":GREEN+"22",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
                {!isEx&&<span style={{color:GREEN,fontSize:11,fontWeight:900,lineHeight:1}}>✓</span>}
                {isEx&&<span style={{color:ORANGE,fontSize:11,fontWeight:900,lineHeight:1}}>✕</span>}
              </div>
              <span style={{fontSize:10,color:MUTED,width:18,textAlign:"right",flexShrink:0}}>{i+1}.</span>
              <span style={{flex:1,fontSize:14,color:isEx?MUTED:TEXT,textDecoration:isEx?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:isEx?400:600}}>{t.title}</span>
              {(t.notes||t.device||t.backup_device)&&!isEx&&<span style={{fontSize:11,color:ORANGE,flexShrink:0}}>📝</span>}
              <span style={{fontSize:12,color:isEx?BORDER:ORANGE,flexShrink:0,fontVariantNumeric:"tabular-nums",fontWeight:700}}>{fmtSecs(t.seconds||0)}</span>
            </button>
          );
        })}
      </div>

      {/* Run footer */}
      <div style={{padding:"10px 16px 32px",borderTop:`1px solid ${BORDER}`,flexShrink:0}}>
        <button onClick={()=>onRun({...sprint,tasks:activeTasks})} disabled={activeTasks.length===0}
          style={{width:"100%",padding:"16px",borderRadius:12,border:"none",background:activeTasks.length===0?"#2a2a2a":LIME,color:activeTasks.length===0?MUTED:"#000",fontWeight:900,fontSize:16,cursor:activeTasks.length===0?"default":"pointer",fontFamily:"inherit",letterSpacing:-0.5}}>
          {activeTasks.length===0?"No tasks to run":`▶ Run ${activeTasks.length} Task${activeTasks.length!==1?"s":""} · ${fmtSecs(totalSecs(activeTasks))}`}
        </button>
      </div>
    </div>
  );
}

/* ── Sprint List ──────────────────────────────── */
function SprintList({user,sprints,loading,settings,onRun,onEdit,onCreate,onDuplicate,onDelete,onRefresh,onShowHistory,onShowSettings,onPreview,onToggleDone}){
  const resetHour=settings.resetHour??4;
  const doneMap=useMemo(()=>{
    const m={};
    sprints.forEach(s=>{m[s.id]=resolveDS(s.daily_state,resetHour).done;});
    return m;
  },[sprints,resetHour]);

  const [showInstall,setShowInstall]=useState(()=>{try{return!localStorage.getItem("sprint_install_dismissed")}catch{return true}});
  const [showCompleted,setShowCompleted]=useState(()=>{try{return localStorage.getItem("sprint_show_completed")==="1"}catch{return false}});

  const toggleShowCompleted=()=>setShowCompleted(v=>{
    const next=!v;
    try{localStorage.setItem("sprint_show_completed",next?"1":"0")}catch{}
    return next;
  });

  // Always sort by scheduled_time (nulls last), then creation order
  const sorted=useMemo(()=>[...sprints].sort((a,b)=>{
    if(a.scheduled_time&&b.scheduled_time)return a.scheduled_time.localeCompare(b.scheduled_time);
    if(a.scheduled_time)return -1;if(b.scheduled_time)return 1;return 0;
  }),[sprints]);

  const displayed=useMemo(()=>showCompleted?sorted:sorted.filter(s=>!doneMap[s.id]),[sorted,doneMap,showCompleted]);
  const doneCount=sorted.filter(s=>doneMap[s.id]).length;

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000"}}>
      <div style={{padding:"12px 16px 10px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:17,letterSpacing:-1,lineHeight:1}}><span style={{color:LIME}}>⚡</span><span style={{color:TEXT}}> SPRINT</span> <span style={{fontSize:10,color:MUTED,letterSpacing:2,fontWeight:400}}>v2.8</span></div>
        </div>
        {sorted.length>0&&(
          <div style={{background:doneCount===sorted.length?"#0a1f0a":INSET,border:`1px solid ${doneCount===sorted.length?GREEN+"44":BORDER}`,borderRadius:7,padding:"3px 9px",display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:12,color:doneCount===sorted.length?GREEN:MUTED,fontWeight:700}}>{doneCount}/{sorted.length}</span>
            <span style={{fontSize:10,color:doneCount===sorted.length?GREEN:MUTED}}>done</span>
          </div>
        )}
        <DotMenu items={[
          {label:"↻ Refresh",action:onRefresh},
          {label:"📊 Run History",action:onShowHistory},
          {label:"⚙️ Settings",action:onShowSettings},
          "---",
          {label:"Sign Out",danger:true,action:()=>db.auth.signOut()},
        ]}/>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
        {showInstall&&<InstallBanner onDismiss={()=>{setShowInstall(false);try{localStorage.setItem("sprint_install_dismissed","1")}catch{}}}/>}
        {loading&&<div style={{display:"flex",justifyContent:"center",paddingTop:60}}><Spinner size={24}/></div>}
        {!loading&&sorted.length===0&&(
          <div style={{textAlign:"center",padding:"80px 0",color:MUTED}}>
            <div style={{fontSize:52,marginBottom:14}}>⚡</div>
            <div style={{fontSize:16,fontWeight:800,color:TEXT,marginBottom:8}}>No sprints yet</div>
            <div style={{fontSize:13,lineHeight:1.6}}>Create a sprint with ordered tasks.<br/>Set a time and check them off throughout the day.</div>
          </div>
        )}
        {!loading&&displayed.map(sp=>{
          const done=doneMap[sp.id];
          return(
            <div key={sp.id} onClick={()=>onPreview(sp)} style={{background:done?"#0a0f0a":CARD,borderRadius:12,border:`1px solid ${done?GREEN+"33":BORDER}`,padding:"13px 14px",marginBottom:9,transition:"opacity .2s",opacity:done?0.62:1,cursor:"pointer"}}>
              {/* Time — large and first */}
              {sp.scheduled_time&&(
                <div style={{fontSize:22,fontWeight:900,color:done?"#30D158aa":ORANGE,letterSpacing:-0.5,lineHeight:1,marginBottom:5}}>{fmtTime12(sp.scheduled_time)}</div>
              )}
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:20,flexShrink:0}}>{sp.emoji||"⚡"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:800,fontSize:14,color:done?"#30D158aa":TEXT,textDecoration:done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sp.name}</div>
                  <div style={{fontSize:11,color:MUTED,marginTop:2,display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                    <span>{(sp.tasks||[]).length} tasks</span>
                    {totalSecs(sp.tasks)>0&&<><span style={{color:BORDER}}>·</span><span style={{color:ORANGE}}>{fmtSecs(totalSecs(sp.tasks))}</span></>}
                    {sp.frequency_days
                      ?<><span style={{color:BORDER}}>·</span><span style={{color:LIME,fontWeight:700,fontSize:10}}>{sp.frequency_days.split(',').map(d=>DAY_LABEL[d]||d).join(' · ')}</span></>
                      :(sp.frequency&&sp.frequency>1)&&<><span style={{color:BORDER}}>·</span><span style={{color:MUTED}}>every {sp.frequency}d</span></>
                    }
                  </div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0,alignItems:"center"}}>
                  <button onClick={e=>{e.stopPropagation();onRun(sp);}} style={{padding:"7px 14px",borderRadius:7,border:"none",background:LIME,color:"#000",fontWeight:900,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>▶ Run</button>
                  {/* Checkoff — right next to Run */}
                  <button onClick={e=>{e.stopPropagation();onToggleDone(sp.id,!done);}}
                    style={{width:28,height:28,borderRadius:"50%",flexShrink:0,cursor:"pointer",border:`2px solid ${done?GREEN:BORDER}`,background:done?GREEN:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                    {done&&<span style={{color:"#000",fontSize:12,fontWeight:900,lineHeight:1}}>✓</span>}
                  </button>
                  <div onClick={e=>e.stopPropagation()}>
                    <DotMenu items={[
                      {label:"▶ Run sprint",action:()=>onRun(sp)},
                      {label:"Edit sprint",action:()=>onEdit(sp)},
                      {label:"Duplicate sprint",action:()=>onDuplicate(sp)},
                      "---",
                      {label:done?"Unmark done":"Mark done today",action:()=>onToggleDone(sp.id,!done)},
                      "---",
                      {label:"Delete sprint",danger:true,action:()=>onDelete(sp.id,sp.name)},
                    ]}/>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Footer: toggle + new button */}
      <div style={{padding:"10px 16px 22px",borderTop:`1px solid ${BORDER}`,flexShrink:0,display:"flex",flexDirection:"column",gap:8}}>
        {doneCount>0&&(
          <button onClick={toggleShowCompleted}
            style={{width:"100%",padding:"9px",borderRadius:8,border:`1px solid ${BORDER}`,background:"transparent",color:MUTED,fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>
            {showCompleted?`Hide ${doneCount} completed sprint${doneCount!==1?"s":""}`:`Show ${doneCount} completed sprint${doneCount!==1?"s":""}`}
          </button>
        )}
        <button onClick={onCreate} style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:LIME,color:"#000",fontWeight:900,fontSize:15,fontFamily:"inherit",cursor:"pointer"}}>+ New Sprint</button>
      </div>
    </div>
  );
}

/* ── Sprint Editor ────────────────────────────── */
const SEC_PRESETS=[15,30,45,60,90,120,180,300];

function SprintEditor({sprint,onSave,onCancel,onDelete}){
  const isNew=!sprint?.id;
  const [name,setName]=useState(sprint?.name||"");
  const [emoji,setEmoji]=useState(sprint?.emoji||"⚡");
  const [scheduledTime,setScheduledTime]=useState(sprint?.scheduled_time||"");
  const [frequency,setFrequency]=useState(sprint?.frequency??1);
  const [freqMode,setFreqMode]=useState(sprint?.frequency_days?'days':'interval');
  const [freqDays,setFreqDays]=useState(()=>{
    if(sprint?.frequency_days)return new Set(sprint.frequency_days.split(',').filter(Boolean));
    return new Set();
  });
  const [tasks,setTasks]=useState((sprint?.tasks||[]).map(t=>({...t})));
  const [newTitle,setNewTitle]=useState("");
  const [newSecs,setNewSecs]=useState(30);
  const [saving,setSaving]=useState(false);
  const [expandedNote,setExpandedNote]=useState(null);
  const newTitleRef=useRef(null);

  const addTask=()=>{
    if(!newTitle.trim())return;
    setTasks(ts=>[...ts,{id:genId(),title:newTitle.trim(),seconds:Math.max(1,Number(newSecs)||30),notes:""}]);
    setNewTitle("");setTimeout(()=>newTitleRef.current?.focus(),50);
  };
  const delTask=id=>setTasks(ts=>ts.filter(t=>t.id!==id));
  const updTask=(id,k,v)=>setTasks(ts=>ts.map(t=>t.id===id?{...t,[k]:v}:t));
  const moveUp=i=>{if(i===0)return;const a=[...tasks];[a[i-1],a[i]]=[a[i],a[i-1]];setTasks(a);};
  const moveDn=i=>{if(i===tasks.length-1)return;const a=[...tasks];[a[i],a[i+1]]=[a[i+1],a[i]];setTasks(a);};
  const save=async()=>{if(!name.trim())return;setSaving(true);const fd=freqMode==='days'&&freqDays.size>0?DAY_ABBR.filter(d=>freqDays.has(d)).join(','):null;await onSave({...(sprint||{}),name:name.trim(),emoji,scheduled_time:scheduledTime||null,frequency:Number(frequency)||1,frequency_days:fd,tasks});setSaving(false);};
  const inp={padding:"10px 12px",borderRadius:8,border:`1px solid ${BORDER}`,background:CARD,color:TEXT,fontSize:14,fontFamily:"inherit",outline:"none"};

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000"}}>
      <div style={{padding:"16px 18px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={onCancel} style={{background:"none",border:"none",color:MUTED,fontSize:26,cursor:"pointer",lineHeight:1,padding:"0 4px",marginLeft:-4}}>‹</button>
        <div style={{flex:1,fontWeight:800,fontSize:16,color:TEXT}}>{isNew?"New Sprint":"Edit Sprint"}</div>
        {!isNew&&<DotMenu items={[{label:"Delete sprint",danger:true,action:onDelete}]}/>}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px 18px"}}>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <input value={emoji} onChange={e=>setEmoji(e.target.value)} style={{...inp,width:52,textAlign:"center",fontSize:22,padding:"8px 4px"}}/>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Sprint name…" style={{...inp,flex:1,fontSize:15,fontWeight:700}}/>
        </div>

        <div style={{marginBottom:22}}>
          <div style={{fontSize:10,color:MUTED,letterSpacing:2,fontWeight:700,marginBottom:8}}>SCHEDULED TIME <span style={{color:BORDER,fontWeight:400,letterSpacing:0,fontSize:10}}> — optional, sorts your day</span></div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input type="time" value={scheduledTime} onChange={e=>setScheduledTime(e.target.value)} style={{...inp,flex:1,color:scheduledTime?ORANGE:MUTED,fontWeight:scheduledTime?700:400}}/>
            {scheduledTime&&<button onClick={()=>setScheduledTime("")} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:7,padding:"10px 12px",color:MUTED,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Clear</button>}
          </div>
          {scheduledTime&&<div style={{fontSize:11,color:ORANGE,marginTop:6,fontWeight:700}}>⏰ {fmtTime12(scheduledTime)}</div>}
        </div>

        <div style={{marginBottom:22}}>
          <div style={{fontSize:10,color:MUTED,letterSpacing:2,fontWeight:700,marginBottom:8}}>FREQUENCY <span style={{color:BORDER,fontWeight:400,letterSpacing:0,fontSize:10}}> — when this sprint runs</span></div>
          {/* Mode toggle */}
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            {[['interval','Every N Days'],['days','Specific Days']].map(([m,l])=>(
              <button key={m} onClick={()=>setFreqMode(m)} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${freqMode===m?LIME:BORDER}`,background:freqMode===m?"#0a140a":"transparent",color:freqMode===m?LIME:MUTED,fontSize:12,fontWeight:freqMode===m?700:400,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
            ))}
          </div>
          {freqMode==='interval'&&(
            <>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={()=>setFrequency(f=>Math.max(1,Number(f)-1))} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:7,width:40,height:40,color:MUTED,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
                <div style={{flex:1,textAlign:"center"}}>
                  <div style={{fontSize:24,fontWeight:900,color:frequency===1?LIME:ORANGE,fontVariantNumeric:"tabular-nums"}}>
                    {frequency===1?"Daily":`Every ${frequency} days`}
                  </div>
                </div>
                <button onClick={()=>setFrequency(f=>Math.min(30,Number(f)+1))} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:7,width:40,height:40,color:MUTED,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:10}}>
                {[1,2,3,4,5,7,10,14].map(n=>(
                  <button key={n} onClick={()=>setFrequency(n)} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${frequency===n?(n===1?LIME:ORANGE):BORDER}`,background:frequency===n?"#0a0a0a":"transparent",color:frequency===n?(n===1?LIME:ORANGE):MUTED,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:frequency===n?700:400}}>
                    {n===1?"Daily":n===7?"Weekly":n===14?"Biweekly":`${n}d`}
                  </button>
                ))}
              </div>
            </>
          )}
          {freqMode==='days'&&(
            <>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {DAY_ABBR.map(d=>{
                  const sel=freqDays.has(d);
                  return(
                    <button key={d} onClick={()=>setFreqDays(prev=>{const n=new Set(prev);if(n.has(d))n.delete(d);else n.add(d);return n;})}
                      style={{padding:"8px 10px",borderRadius:8,border:`1px solid ${sel?LIME:BORDER}`,background:sel?"#0a140a":"transparent",color:sel?LIME:MUTED,fontSize:12,fontWeight:sel?700:400,cursor:"pointer",fontFamily:"inherit",minWidth:42,textAlign:"center"}}>
                      {DAY_LABEL[d]}
                    </button>
                  );
                })}
              </div>
              {freqDays.size>0&&<div style={{fontSize:11,color:LIME,marginTop:8,fontWeight:700}}>Runs: {DAY_ABBR.filter(d=>freqDays.has(d)).map(d=>DAY_LABEL[d]).join(', ')}</div>}
              {freqDays.size===0&&<div style={{fontSize:11,color:MUTED,marginTop:8}}>Select at least one day.</div>}
            </>
          )}
        </div>

        <div style={{fontSize:10,color:MUTED,letterSpacing:2,fontWeight:700,marginBottom:10}}>TASKS · {tasks.length}{totalSecs(tasks)>0&&` · ${fmtSecs(totalSecs(tasks))} total`}</div>

        {tasks.map((t,i)=>(
          <div key={t.id} style={{marginBottom:6}}>
            <div style={{background:CARD,borderRadius:expandedNote===t.id?"10px 10px 0 0":10,border:`1px solid ${BORDER}`,padding:"9px 12px",display:"flex",alignItems:"center",gap:7}}>
              <div style={{display:"flex",flexDirection:"column",gap:1,flexShrink:0}}>
                <button onClick={()=>moveUp(i)} disabled={i===0} style={{background:"none",border:"none",color:i===0?BORDER:MUTED,cursor:i===0?"default":"pointer",fontSize:9,lineHeight:1,padding:"2px 4px"}}>▲</button>
                <button onClick={()=>moveDn(i)} disabled={i===tasks.length-1} style={{background:"none",border:"none",color:i===tasks.length-1?BORDER:MUTED,cursor:i===tasks.length-1?"default":"pointer",fontSize:9,lineHeight:1,padding:"2px 4px"}}>▼</button>
              </div>
              <span style={{fontSize:10,color:MUTED,width:16,textAlign:"right",flexShrink:0}}>{i+1}.</span>
              <input value={t.title} onChange={e=>updTask(t.id,"title",e.target.value)} style={{flex:1,background:"transparent",border:"none",color:TEXT,fontSize:13,fontFamily:"inherit",outline:"none",minWidth:0}}/>
              <button onClick={()=>setExpandedNote(expandedNote===t.id?null:t.id)} style={{background:"none",border:"none",color:(t.notes||t.device||t.backup_device)?ORANGE:BORDER,cursor:"pointer",fontSize:13,padding:"0 4px",lineHeight:1,flexShrink:0}} title="Notes / Device">📝</button>
              <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                <button onClick={()=>updTask(t.id,"seconds",Math.max(5,t.seconds-5))} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:5,width:22,height:22,color:MUTED,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>−</button>
                <div style={{minWidth:38,textAlign:"center",fontSize:12,color:LIME,fontWeight:800,fontVariantNumeric:"tabular-nums"}}>{fmtSecs(t.seconds)}</div>
                <button onClick={()=>updTask(t.id,"seconds",t.seconds+5)} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:5,width:22,height:22,color:MUTED,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>+</button>
              </div>
              <button onClick={()=>delTask(t.id)} style={{background:"none",border:"none",color:"#FF453A33",cursor:"pointer",fontSize:14,padding:"0 2px",transition:"color .15s",lineHeight:1,flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.color=RED} onMouseLeave={e=>e.currentTarget.style.color="#FF453A33"}>✕</button>
            </div>
            {expandedNote===t.id&&(
              <div style={{background:"#0a0a10",borderRadius:"0 0 10px 10px",border:`1px solid ${BORDER}`,borderTop:"none",padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
                <div>
                  <div style={{fontSize:9,color:MUTED,letterSpacing:2,fontWeight:700,marginBottom:4}}>NOTES</div>
                  <textarea value={t.notes||""} onChange={e=>updTask(t.id,"notes",e.target.value)} placeholder="Notes shown mid-run…" rows={2} style={{width:"100%",background:"transparent",border:"none",color:TEXT,fontSize:13,fontFamily:"inherit",outline:"none",resize:"none",lineHeight:1.5}}/>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:9,color:MUTED,letterSpacing:2,fontWeight:700,marginBottom:4}}>📱 DEVICE</div>
                    <input value={t.device||""} onChange={e=>updTask(t.id,"device",e.target.value)} placeholder="e.g. iPhone, iPad…" style={{width:"100%",background:"transparent",border:`1px solid ${BORDER}`,borderRadius:6,padding:"6px 8px",color:TEXT,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:9,color:MUTED,letterSpacing:2,fontWeight:700,marginBottom:4}}>🔁 BACKUP</div>
                    <input value={t.backup_device||""} onChange={e=>updTask(t.id,"backup_device",e.target.value)} placeholder="e.g. Laptop, TV…" style={{width:"100%",background:"transparent",border:`1px solid ${BORDER}`,borderRadius:6,padding:"6px 8px",color:TEXT,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}

        {tasks.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:MUTED,fontSize:13,fontStyle:"italic",border:`1px dashed ${BORDER}`,borderRadius:10,marginBottom:12}}>No tasks yet</div>}

        <div style={{background:INSET,borderRadius:10,border:`1px solid ${BORDER}`,padding:"14px",marginTop:8}}>
          <div style={{fontSize:10,color:MUTED,letterSpacing:2,marginBottom:10,fontWeight:700}}>ADD TASK</div>
          <input ref={newTitleRef} value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="Task name…" style={{...inp,width:"100%",marginBottom:10}}/>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:MUTED,flexShrink:0}}>Duration:</span>
            <button onClick={()=>setNewSecs(s=>Math.max(5,s-5))} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:6,width:28,height:28,color:MUTED,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
            <span style={{fontSize:15,fontWeight:800,color:LIME,minWidth:48,textAlign:"center",fontVariantNumeric:"tabular-nums",flexShrink:0}}>{fmtSecs(newSecs)}</span>
            <button onClick={()=>setNewSecs(s=>s+5)} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:6,width:28,height:28,color:MUTED,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
            {SEC_PRESETS.map(s=>(
              <button key={s} onClick={()=>setNewSecs(s)} style={{padding:"4px 9px",borderRadius:6,fontSize:10,fontFamily:"inherit",fontWeight:700,cursor:"pointer",background:newSecs===s?LIME:CARD,color:newSecs===s?"#000":MUTED,border:`1px solid ${newSecs===s?LIME:BORDER}`}}>
                {s<60?s+"s":s%60===0?`${s/60}m`:`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`}
              </button>
            ))}
          </div>
          <button onClick={addTask} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:newTitle.trim()?LIME:"#1a1a1a",color:newTitle.trim()?"#000":MUTED,fontWeight:800,fontSize:13,cursor:newTitle.trim()?"pointer":"default",fontFamily:"inherit",transition:"all .15s"}}>+ Add Task</button>
        </div>
      </div>

      <div style={{padding:"12px 18px 20px",borderTop:`1px solid ${BORDER}`,display:"flex",gap:8,flexShrink:0}}>
        <button onClick={onCancel} style={{flex:1,padding:"12px",borderRadius:9,border:`1px solid ${BORDER}`,background:"transparent",color:MUTED,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>Cancel</button>
        <button onClick={save} disabled={saving||!name.trim()} style={{flex:2,padding:"12px",borderRadius:9,border:"none",background:saving||!name.trim()?"#2a2a2a":LIME,color:saving||!name.trim()?MUTED:"#000",cursor:saving||!name.trim()?"default":"pointer",fontWeight:900,fontFamily:"inherit",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {saving&&<Spinner size={14} color={MUTED}/>}{saving?"Saving…":"Save Sprint"}
        </button>
      </div>
    </div>
  );
}

/* ── Sprint Runner ────────────────────────────── */
function SprintRunner({sprint,onClose,onLogRun,onComplete}){
  const tasks=useMemo(()=>sprint.tasks||[],[sprint]);
  const restore=sprint._restore;

  // Display state only — the timer NEVER reads React state
  const [dispIdx,setDispIdx]=useState(()=>restore?.taskIdx??0);
  const [dispSecs,setDispSecs]=useState(()=>restore?.secs??(tasks[0]?.seconds||30));
  const [dispElapsed,setDispElapsed]=useState(()=>restore?.elapsed??0);
  const [phase,setPhase]=useState(()=>restore?.phase??"idle");
  const [isRunning,setIsRunning]=useState(false);
  const [transitioning,setTransitioning]=useState(false);
  const [snapRing,setSnapRing]=useState(false);
  const [expandedNote,setExpandedNote]=useState(false);
  const [ringSize,setRingSize]=useState(300);

  // Single mutable timer object — the interval owns this entirely
  const T=useRef({
    running:false, transitioning:false,
    secs:restore?.secs??(tasks[0]?.seconds||30),
    taskIdx:restore?.taskIdx??0,
    elapsed:restore?.elapsed??0,
    tasks,
    taskStartedAt:Date.now(), // wall-clock when current task started
  });
  const containerRef=useRef(null);
  const tickRef=useRef(null);
  const loggedRef=useRef(false);
  const gotoRef=useRef(null); // always points to latest goToTask

  useEffect(()=>{T.current.tasks=tasks;},[tasks]);
  useEffect(()=>{setExpandedNote(false);},[dispIdx]);
  useEffect(()=>()=>{clearInterval(tickRef.current);schedNotifTimers.current.forEach(clearTimeout);relWL();},[]);
  useEffect(()=>{askNotif();},[]);

  // Ring sizing
  useEffect(()=>{
    const el=containerRef.current;if(!el)return;
    const obs=new ResizeObserver(e=>{const w=e[0].contentRect.width;setRingSize(Math.min(Math.max(w-12,240),420));});
    obs.observe(el);return()=>obs.disconnect();
  },[]);

  // ── Upfront notification scheduling ────────────────────────────
  // Schedule OS notifications for every task transition so they fire
  // even when Chrome is backgrounded / screen is off.
  const schedNotifTimers=useRef([]);
  const scheduleAllNotifs=useCallback((taskList,startIdx,startSecs)=>{
    // Cancel previous
    schedNotifTimers.current.forEach(clearTimeout);
    schedNotifTimers.current=[];
    if(!("Notification" in window)||Notification.permission!=="granted")return;
    let delay=(startSecs)*1000; // ms until first task completes
    for(let i=startIdx+1;i<taskList.length;i++){
      const task=taskList[i];
      const d=delay;
      schedNotifTimers.current.push(setTimeout(()=>{
        if(!T.current.running)return;
        try{new Notification(`⚡ ${task.title}`,{body:`Task ${i+1}/${taskList.length} · ${fmtSecs(task.seconds||0)}`,tag:"sprint-task",renotify:true,silent:false});}catch{}
      },d));
      delay+=task.seconds*1000;
    }
    // Final "done" notification
    schedNotifTimers.current.push(setTimeout(()=>{
      if(!T.current.running)return;
      try{new Notification("✓ Sprint Complete!",{body:"All tasks finished.",tag:"sprint-done",renotify:true});}catch{}
    },delay));
  },[]);

  // Wake lock + background recalculation on visibility change
  useEffect(()=>{
    if(phase!=="running")return;
    acqWL();

    const onVisible=async()=>{
      await acqWL();
      if(!T.current.running||T.current.transitioning)return;
      // Recalculate exact position using wall clock
      const elapsed=Math.floor((Date.now()-T.current.taskStartedAt)/1000);
      const taskSecs=T.current.tasks[T.current.taskIdx]?.seconds||30;
      const remaining=taskSecs-elapsed;
      if(remaining>0){
        T.current.secs=remaining;
        setDispSecs(remaining);
      }else{
        // Task already finished while backgrounded — advance
        T.current.transitioning=true;
        let overflow=Math.abs(remaining);
        let idx=T.current.taskIdx+1;
        while(overflow>0&&idx<T.current.tasks.length){
          const ns=T.current.tasks[idx].seconds||30;
          if(overflow>=ns){overflow-=ns;idx++;}
          else{T.current.secs=ns-overflow;overflow=0;}
        }
        setTransitioning(true);
        setTimeout(()=>gotoRef.current(idx),100);
      }
    };

    document.addEventListener("visibilitychange",onVisible);
    return()=>{relWL();document.removeEventListener("visibilitychange",onVisible);};
  },[phase]);

  // Tab title
  useEffect(()=>{
    if(phase==="running"&&tasks[dispIdx])document.title=`⚡ ${fmtSecs(dispSecs)} — ${tasks[dispIdx].title}`;
    else if(phase==="done")document.title="✓ Sprint Complete";
    else document.title="SPRINT v2.4";
    return()=>{document.title="SPRINT v2.4";};
  },[dispSecs,phase,dispIdx,tasks]);

  // Persist runner state
  useEffect(()=>{
    if(phase==="idle"||phase==="done"){clearRunner();return;}
    saveRunner({sprintId:sprint.id,taskIdx:dispIdx,secs:dispSecs,elapsed:dispElapsed,phase,running:T.current.running});
  },[dispIdx,dispSecs,dispElapsed,phase]);

  // Log run on done
  useEffect(()=>{
    if(phase==="done"&&!loggedRef.current){
      loggedRef.current=true;
      onLogRun&&onLogRun(sprint.id,sprint.name,sprint.emoji||"⚡",tasks.length,totalSecs(tasks),T.current.elapsed);
      onComplete&&onComplete(sprint.id);
    }
  },[phase]);

  // ── Timer ───────────────────────────────────
  const finishSprint=useCallback(()=>{
    clearInterval(tickRef.current);
    schedNotifTimers.current.forEach(clearTimeout);
    T.current.running=false;T.current.transitioning=false;
    setPhase("done");setIsRunning(false);setTransitioning(false);
    clearRunner();
    try{window.speechSynthesis.cancel();}catch{}
    setTimeout(()=>{chime();speak("Sprint complete! Great work.");},100);
  },[]);

  const goToTask=useCallback((idx)=>{
    const tks=T.current.tasks;
    if(idx>=tks.length){finishSprint();return;}
    const task=tks[idx];
    const ns=task.seconds||30;
    // Update T synchronously — interval reads this on very next tick
    T.current.taskIdx=idx;
    T.current.secs=ns;
    T.current.transitioning=false;
    T.current.taskStartedAt=Date.now(); // wall-clock anchor for background recalc
    // Reschedule all remaining notifications from this task onward
    scheduleAllNotifs(tks,idx,ns);
    // Snap ring to full instantly, then re-enable smooth drain
    setSnapRing(true);
    requestAnimationFrame(()=>requestAnimationFrame(()=>setSnapRing(false)));
    setTransitioning(false);
    setDispIdx(idx);
    setDispSecs(ns);
    showNotif(task,idx+1,tks.length);
    speak(task.title);
  },[finishSprint,scheduleAllNotifs]);

  // Keep gotoRef fresh so setTimeout closures always call latest version
  useEffect(()=>{gotoRef.current=goToTask;},[goToTask]);

  const startInterval=useCallback(()=>{
    clearInterval(tickRef.current);
    tickRef.current=setInterval(()=>{
      const t=T.current;
      if(!t.running||t.transitioning)return;
      // Direct mutation — zero React state reads inside this callback
      t.secs-=1;
      t.elapsed+=1;
      setDispSecs(t.secs);
      setDispElapsed(t.elapsed);
      if(t.secs===3)speak("Three");
      else if(t.secs===2)speak("Two");
      else if(t.secs===1)speak("One");
      if(t.secs<=0){
        t.transitioning=true;
        setTransitioning(true);
        beep(880,200);
        const next=t.taskIdx+1;
        const isLast=next>=t.tasks.length;
        if(!isLast)setTimeout(()=>beep(660,120,.18),200);
        setTimeout(()=>gotoRef.current(next),isLast?400:1400);
      }
    },1000);
  },[]);

  const startSprint=()=>{
    if(tasks.length===0)return;
    const ft=tasks[0];
    T.current={running:true,transitioning:false,secs:ft.seconds||30,taskIdx:0,elapsed:0,tasks,taskStartedAt:Date.now()};
    setPhase("running");setIsRunning(true);
    setDispIdx(0);setDispSecs(ft.seconds||30);setDispElapsed(0);setTransitioning(false);
    showNotif(ft,1,tasks.length);
    scheduleAllNotifs(tasks,0,ft.seconds||30);
    speak(ft.title);
    startInterval();
  };

  const togglePause=()=>{
    if(T.current.running){
      T.current.running=false;setIsRunning(false);
      try{window.speechSynthesis.cancel();}catch{}
    }else{
      T.current.running=true;setIsRunning(true);
      speak(tasks[T.current.taskIdx]?.title||"Resuming");
    }
  };

  const skipTask=()=>{T.current.transitioning=true;gotoRef.current(T.current.taskIdx+1);};
  const didTask=()=>{T.current.transitioning=true;gotoRef.current(T.current.taskIdx+1);};
  const prevTask=()=>{if(T.current.taskIdx===0)return;T.current.transitioning=true;gotoRef.current(T.current.taskIdx-1);};
  const stopSprint=()=>{
    clearInterval(tickRef.current);
    schedNotifTimers.current.forEach(clearTimeout);
    T.current.running=false;T.current.transitioning=false;
    setIsRunning(false);setPhase("idle");
    setDispIdx(0);setDispSecs(tasks[0]?.seconds||30);setDispElapsed(0);setTransitioning(false);
    clearRunner();
    try{window.speechSynthesis.cancel();}catch{}
  };

  // Restore: auto-resume if we were mid-run when page reloaded
  useEffect(()=>{
    if(restore?.running&&restore?.phase==="running"){
      T.current.running=true;
      T.current.taskStartedAt=Date.now()-(((restore.secs!==undefined?(tasks[T.current.taskIdx]?.seconds||30)-restore.secs:0))*1000);
      setIsRunning(true);setPhase("running");
      scheduleAllNotifs(tasks,T.current.taskIdx,T.current.secs);
      startInterval();
    }
  // eslint-disable-next-line
  },[]);

  // Ring math
  const taskTotal=(tasks[dispIdx]?.seconds)||1;
  const pct=Math.max(0,Math.min(1,dispSecs/taskTotal));
  const ringColor=dispSecs>30?LIME:dispSecs>10?ORANGE:RED;
  const R=ringSize/2*.88,CX=ringSize/2,CY=ringSize/2,C=2*Math.PI*R,sw=Math.round(ringSize*.09);
  const currentTask=tasks[dispIdx]||null;
  const upcomingTasks=tasks.slice(dispIdx+1);
  const totalRemaining=useMemo(()=>tasks.slice(dispIdx).reduce((a,t,i)=>a+(i===0?dispSecs:(t.seconds||0)),0),[tasks,dispIdx,dispSecs]);

  if(phase==="done"){
    return(
      <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#000",gap:16,padding:32,textAlign:"center"}}>
        <div style={{fontSize:60,marginBottom:8}}>🎉</div>
        <div style={{fontSize:32,fontWeight:900,color:LIME,letterSpacing:-2}}>SPRINT COMPLETE</div>
        <div style={{fontSize:16,color:MUTED}}>{sprint.emoji||"⚡"} {sprint.name}</div>
        <div style={{display:"flex",gap:12,marginTop:8,flexWrap:"wrap",justifyContent:"center"}}>
          {[["TASKS",tasks.length,TEXT],["ELAPSED",fmtSecs(T.current.elapsed),LIME],["PLANNED",fmtSecs(totalSecs(tasks)),ORANGE]].map(([label,val,col])=>(
            <div key={label} style={{background:CARD,borderRadius:10,border:`1px solid ${BORDER}`,padding:"12px 18px"}}>
              <div style={{fontSize:10,color:MUTED,letterSpacing:2,marginBottom:4}}>{label}</div>
              <div style={{fontSize:22,fontWeight:900,color:col}}>{val}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:300,marginTop:16}}>
          <button onClick={onClose} style={{width:"100%",padding:"16px",borderRadius:12,border:"none",background:LIME,color:"#000",fontWeight:900,fontSize:16,cursor:"pointer",fontFamily:"inherit",letterSpacing:-0.5}}>← Back Home</button>
          <button onClick={stopSprint} style={{width:"100%",padding:"10px",borderRadius:10,border:`1px solid ${BORDER}`,background:"transparent",color:"#555",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>↺ Run Again</button>
        </div>
      </div>
    );
  }

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000"}}>
      <div style={{padding:"14px 18px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={()=>{stopSprint();onClose();}} style={{background:"none",border:"none",color:MUTED,fontSize:26,cursor:"pointer",lineHeight:1,padding:"0 4px",marginLeft:-4}}>‹</button>
        <span style={{fontSize:20,flexShrink:0}}>{sprint.emoji||"⚡"}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:14,color:TEXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sprint.name}</div>
          <div style={{fontSize:11,color:MUTED,marginTop:1}}>{fmtSecs(totalRemaining)} remaining · {tasks.length} tasks</div>
        </div>
        {phase==="running"&&<button onClick={stopSprint} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${BORDER}`,background:"transparent",color:MUTED,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Stop</button>}
      </div>

      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 12px 28px",gap:16}}>
        {tasks.length>0&&(
          <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center",maxWidth:420}}>
            {tasks.map((t,i)=>(
              <div key={t.id||i} style={{width:8,height:8,borderRadius:"50%",background:i<dispIdx?GREEN:i===dispIdx?(phase==="running"?LIME:"#555"):"#2a2a2a",transition:"background .4s",boxShadow:i===dispIdx&&phase==="running"?`0 0 10px ${LIME}55`:"none"}}/>
            ))}
          </div>
        )}

        {currentTask&&(
          <div style={{textAlign:"center",padding:"0 8px",width:"100%",maxWidth:420}}>
            <div style={{fontSize:10,color:MUTED,letterSpacing:2,marginBottom:8,fontWeight:700}}>
              {phase==="idle"?"READY TO RUN":transitioning?"FINISHING…":isRunning?"NOW RUNNING":"PAUSED"} · {dispIdx+1}/{tasks.length}
            </div>
            <div style={{fontSize:28,fontWeight:900,color:TEXT,lineHeight:1.2,transition:"opacity .3s",opacity:transitioning?0.3:1}}>{currentTask.title}</div>
            {phase==="idle"&&<div style={{fontSize:12,color:MUTED,marginTop:6}}>{fmtSecs(currentTask.seconds)} · tap Start when ready</div>}
            {currentTask.notes&&(
              <div style={{marginTop:10,padding:"10px 14px",borderRadius:9,background:"#0e0900",border:`1px solid ${ORANGE}33`,fontSize:13,color:TEXT,lineHeight:1.6,textAlign:"left",whiteSpace:"pre-wrap"}}>{currentTask.notes}</div>
            )}
            {(currentTask.device||currentTask.backup_device)&&(
              <div style={{marginTop:8,display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center"}}>
                {currentTask.device&&(
                  <div style={{padding:"5px 12px",borderRadius:7,background:"#0a0a18",border:`1px solid #4444aa44`,display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:11}}>📱</span>
                    <span style={{fontSize:12,color:TEXT,fontWeight:700}}>{currentTask.device}</span>
                  </div>
                )}
                {currentTask.backup_device&&(
                  <div style={{padding:"5px 12px",borderRadius:7,background:"#0a0a0a",border:`1px solid ${BORDER}`,display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:11}}>🔁</span>
                    <span style={{fontSize:12,color:MUTED,fontWeight:600}}>{currentTask.backup_device}</span>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        <div ref={containerRef} style={{width:"100%",maxWidth:440,flexShrink:0}}>
          <div style={{position:"relative",width:ringSize,height:ringSize,margin:"0 auto"}}>
            <svg width={ringSize} height={ringSize} style={{transform:"rotate(-90deg)"}}>
              <circle cx={CX} cy={CY} r={R} fill="none" stroke="#1a1a1a" strokeWidth={sw}/>
              <circle cx={CX} cy={CY} r={R} fill="none"
                stroke={phase==="running"?(transitioning?ORANGE:ringColor):"#2a2a2a"}
                strokeWidth={sw} strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C*(1-pct)}
                style={{transition:snapRing?"none":"stroke-dashoffset 0.95s linear,stroke .35s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3}}>
              <div style={{fontSize:Math.round(ringSize*.25),fontWeight:900,lineHeight:1,fontVariantNumeric:"tabular-nums",color:phase==="running"?(transitioning?ORANGE:ringColor):"#333"}}>
                {phase==="idle"?"GO":fmtSecs(dispSecs)}
              </div>
              {phase==="running"&&!transitioning&&<div style={{fontSize:Math.round(ringSize*.042),color:MUTED,letterSpacing:1}}>{isRunning?"seconds left":"paused"}</div>}
              {transitioning&&<div style={{fontSize:Math.round(ringSize*.042),color:ORANGE,letterSpacing:1}} className="pulse">NEXT UP…</div>}
            </div>
          </div>
        </div>

        {/* Elapsed — outside the ring */}
        {phase==="running"&&dispElapsed>0&&(
          <div style={{fontSize:13,color:MUTED,letterSpacing:1,fontVariantNumeric:"tabular-nums",textAlign:"center"}}>
            {fmtSecs(dispElapsed)} elapsed
          </div>
        )}

        <div style={{display:"flex",gap:20,alignItems:"center"}}>
          {phase==="idle"&&(
            <button onClick={startSprint} disabled={tasks.length===0} style={{padding:"16px 60px",borderRadius:12,border:"none",background:tasks.length===0?"#2a2a2a":LIME,color:tasks.length===0?MUTED:"#000",fontWeight:900,fontSize:18,cursor:tasks.length===0?"default":"pointer",fontFamily:"inherit"}}>
              ▶ Start Sprint
            </button>
          )}
          {phase==="running"&&(
            <>
              <button onClick={prevTask} disabled={dispIdx===0||transitioning} style={{width:52,height:52,borderRadius:"50%",border:`1px solid ${BORDER}`,background:CARD2,color:dispIdx===0||transitioning?BORDER:MUTED,cursor:dispIdx===0||transitioning?"default":"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>◀</button>
              <button onClick={togglePause} disabled={transitioning} style={{width:76,height:76,borderRadius:"50%",border:"none",background:transitioning?"#2a2a2a":LIME,color:"#000",fontSize:28,cursor:transitioning?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>
                {isRunning?"⏸":"▶"}
              </button>
              <button onClick={didTask} disabled={transitioning} title="Already did this"
                style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,width:52,height:52,borderRadius:12,border:`1px solid ${GREEN}55`,background:transitioning?"transparent":"#091409",color:transitioning?BORDER:GREEN,cursor:transitioning?"default":"pointer",fontSize:18,fontWeight:900}}>
                ✅
                <span style={{fontSize:8,letterSpacing:.5,color:transitioning?BORDER:GREEN,fontWeight:700}}>DID</span>
              </button>
              <button onClick={skipTask} disabled={transitioning} style={{width:52,height:52,borderRadius:"50%",border:`1px solid ${BORDER}`,background:CARD2,color:transitioning?BORDER:MUTED,cursor:transitioning?"default":"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>▶▶</button>
            </>
          )}
        </div>

        {phase==="idle"&&<div style={{fontSize:11,color:"#2a2a2a",textAlign:"center",lineHeight:1.7,maxWidth:300}}>🔊 Each task announced aloud · 🔒 Screen stays on</div>}

        {upcomingTasks.length>0&&(
          <div style={{width:"100%",maxWidth:440}}>
            <div style={{fontSize:10,color:MUTED,letterSpacing:2,marginBottom:8,fontWeight:700}}>UPCOMING · {upcomingTasks.length}</div>
            {upcomingTasks.map((t,i)=>(
              <div key={t.id||i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:9,background:CARD,border:`1px solid ${BORDER}`,marginBottom:5}}>
                <span style={{fontSize:10,color:MUTED,width:18,textAlign:"right",flexShrink:0}}>{dispIdx+2+i}.</span>
                <span style={{flex:1,fontSize:13,color:TEXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
                {t.notes&&<span style={{fontSize:11,color:ORANGE,flexShrink:0}}>📝</span>}
                <span style={{fontSize:11,color:ORANGE,flexShrink:0,fontVariantNumeric:"tabular-nums"}}>{fmtSecs(t.seconds||0)}</span>
              </div>
            ))}
          </div>
        )}

        {phase==="running"&&dispIdx>0&&(
          <div style={{width:"100%",maxWidth:440}}>
            <div style={{fontSize:10,color:MUTED,letterSpacing:2,marginBottom:8,fontWeight:700}}>COMPLETED</div>
            {tasks.slice(0,dispIdx).reverse().map((t,i)=>(
              <div key={t.id||i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderRadius:9,background:"#091409",border:"1px solid #30D15822",marginBottom:4}}>
                <span style={{color:GREEN,fontSize:11,flexShrink:0}}>✓</span>
                <span style={{flex:1,fontSize:12,color:"#30D158aa",textDecoration:"line-through",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
                <span style={{fontSize:10,color:"#30D15866",flexShrink:0}}>{fmtSecs(t.seconds||0)}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Root App ─────────────────────────────────── */
function App(){
  const [screen,setScreen]=useState("loading");
  const [user,setUser]=useState(null);
  const [sprints,setSprints]=useState([]);
  const [loadingList,setLoadingList]=useState(true);
  const [editTarget,setEditTarget]=useState(undefined);
  const [runTarget,setRunTarget]=useState(null);
  const [settings,setSettings]=useState({});
  const [showHistory,setShowHistory]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [previewTarget,setPreviewTarget]=useState(null);

  const loadSprints=useCallback(async(u)=>{
    setLoadingList(true);
    const uid=(u||user)?.id;if(!uid)return;
    const{data,error}=await db.from("sprints_v2").select("*").eq("user_id",uid).order("created_at",{ascending:true});
    if(!error)setSprints(data||[]);
    setLoadingList(false);
  },[user]);

  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{
      if(session){
        const s=loadSettings(session.user.id);
        setUser(session.user);setSettings(s);setScreen("list");loadSprints(session.user);
      }else setScreen("auth");
    });
    const{data:{subscription}}=db.auth.onAuthStateChange((_,session)=>{
      if(session){
        setUser(session.user);setSettings(loadSettings(session.user.id));setScreen("list");loadSprints(session.user);
      }else{setUser(null);setSprints([]);setScreen("auth");}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Restore running sprint after page reload
  useEffect(()=>{
    if(screen!=="list"||sprints.length===0||runTarget)return;
    const saved=loadRunner();
    if(!saved?.sprintId)return;
    const sp=sprints.find(s=>s.id===saved.sprintId);
    if(!sp)return;
    const advanced=advanceRunner(saved,sp.tasks||[]);
    if(advanced.phase==="done"){clearRunner();return;}
    setRunTarget({...sp,_restore:advanced});
    setScreen("run");
  },[screen,sprints]);

  const saveSprint=async data=>{
    const uid=user?.id;if(!uid)return;
    if(data.id){
      await db.from("sprints_v2").update({name:data.name,emoji:data.emoji,scheduled_time:data.scheduled_time,frequency:data.frequency??1,frequency_days:data.frequency_days||null,tasks:data.tasks}).eq("id",data.id).eq("user_id",uid);
    }else{
      await db.from("sprints_v2").insert({user_id:uid,name:data.name,emoji:data.emoji,scheduled_time:data.scheduled_time||null,frequency:data.frequency??1,frequency_days:data.frequency_days||null,tasks:data.tasks||[]});
    }
    await loadSprints(user);setEditTarget(undefined);setScreen("list");
  };

  const deleteSprint=async()=>{
    if(!editTarget?.id)return;
    await db.from("sprints_v2").delete().eq("id",editTarget.id).eq("user_id",user.id);
    await loadSprints(user);setEditTarget(undefined);setScreen("list");
  };

  const handleDelete=async(id,name)=>{
    if(!window.confirm(`Delete "${name}"?\nThis cannot be undone.`))return;
    await db.from("sprints_v2").delete().eq("id",id).eq("user_id",user.id);
    await loadSprints(user);
  };

  const handleDuplicate=async sp=>{
    await db.from("sprints_v2").insert({user_id:user.id,name:`${sp.name} (copy)`,emoji:sp.emoji,scheduled_time:sp.scheduled_time||null,frequency:sp.frequency??1,frequency_days:sp.frequency_days||null,tasks:(sp.tasks||[]).map(t=>({...t,id:genId()}))});
    await loadSprints(user);
  };

  const logRun=async(sprintId,sprintName,sprintEmoji,taskCount,plannedSecs,elapsedSecs)=>{
    try{await db.from("sprint_runs").insert({user_id:user.id,sprint_id:sprintId,sprint_name:sprintName,sprint_emoji:sprintEmoji,task_count:taskCount,planned_secs:plannedSecs,elapsed_secs:elapsedSecs});}catch{}
  };

  const saveDailyState=useCallback(async(id,patch)=>{
    const resetHour=settings.resetHour??4;
    const today=todayKey(resetHour);
    // Optimistic local update
    setSprints(prev=>prev.map(s=>{
      if(s.id!==id)return s;
      const existing=resolveDS(s.daily_state,resetHour);
      return{...s,daily_state:{...existing,...patch,date:today}};
    }));
    // Persist to Supabase
    const sp=sprints.find(s=>s.id===id);
    const existing=resolveDS(sp?.daily_state,resetHour);
    await db.from("sprints_v2").update({daily_state:{...existing,...patch,date:today}}).eq("id",id).eq("user_id",user.id);
  },[sprints,settings,user]);

  const saveSettingsAndClose=s=>{
    setSettings(s);
    if(user?.id)saveSettings(user.id,s);
    setShowSettings(false);
  };

  if(screen==="loading")return(
    <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:"#000",flexDirection:"column",gap:16}}>
      <div style={{fontSize:36,fontWeight:900,color:LIME}}>⚡</div><Spinner size={22}/>
    </div>
  );
  if(screen==="auth")return<AuthScreen onAuth={u=>{setUser(u);setSettings(loadSettings(u.id));setScreen("list");loadSprints(u);}}/>;
  if(screen==="run"&&runTarget)return(
    <SprintRunner sprint={runTarget}
      onClose={()=>{setRunTarget(null);setScreen("list");loadSprints(user);}}
      onLogRun={logRun}
      onComplete={id=>saveDailyState(id,{done:true})}
    />
  );
  if(screen==="edit")return(
    <SprintEditor sprint={editTarget} onSave={saveSprint} onCancel={()=>{setEditTarget(undefined);setScreen("list");}} onDelete={deleteSprint}/>
  );
  return(
    <>
      <SprintList user={user} sprints={sprints} loading={loadingList} settings={settings}
        onRun={sp=>{setRunTarget(sp);setScreen("run");}}
        onEdit={sp=>{setEditTarget(sp);setScreen("edit");}}
        onCreate={()=>{setEditTarget(undefined);setScreen("edit");}}
        onDuplicate={handleDuplicate}
        onDelete={handleDelete}
        onRefresh={()=>loadSprints(user)}
        onShowHistory={()=>setShowHistory(true)}
        onShowSettings={()=>setShowSettings(true)}
        onPreview={sp=>setPreviewTarget(sp)}
        onToggleDone={(id,done)=>saveDailyState(id,{done})}
      />
      {previewTarget&&(
        <SprintDetail sprint={previewTarget} settings={settings}
          onClose={()=>setPreviewTarget(null)}
          onRun={sp=>{setPreviewTarget(null);setRunTarget(sp);setScreen("run");}}
          onEdit={sp=>{setPreviewTarget(null);setEditTarget(sp);setScreen("edit");}}
          onDuplicate={sp=>{setPreviewTarget(null);handleDuplicate(sp);}}
          onSaveSkipped={(id,ids)=>saveDailyState(id,{skipped:ids})}
        />
      )}
      {showHistory&&<HistoryPanel user={user} onClose={()=>setShowHistory(false)}/>}
      {showSettings&&<SettingsPanel settings={settings} onSave={saveSettingsAndClose} onClose={()=>setShowSettings(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
